<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSB Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Outfit,sans-serif;background:#060E1A;color:#E2E8F0}
    button,input,select,textarea{font:inherit}
    .header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#0C2340 0%,#081525 100%);border-bottom:1px solid #1A3050;padding:0 22px}
    .header-inner{max-width:1500px;height:58px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0284C7 0%,#06B6D4 100%);display:grid;place-items:center;font-size:18px;box-shadow:0 4px 14px rgba(6,182,212,0.35)}
    .tabs{display:flex;gap:3px;background:#0B1629;border-radius:10px;padding:3px;border:1px solid #1A3050;flex-wrap:wrap}
    .tab{padding:6px 14px;border:none;border-radius:8px;background:transparent;color:#64748B;font-weight:700;cursor:pointer}
    .tab.active{background:linear-gradient(135deg,#0284C7,#06B6D4);color:#fff;box-shadow:0 2px 8px rgba(6,182,212,0.3)}
    .wrap{max-width:1500px;margin:0 auto;padding:18px 22px 32px}
    .card{background:#0B1629;border:1px solid #1A3050;border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.28)}
    .small{font-size:12px}.muted{color:#94A3B8}.subtle{color:#64748B}.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid #29435f;background:#081525}
    .btn.small-btn{padding:4px 8px;font-size:11px}
    .btn{border:none;border-radius:10px;padding:9px 13px;cursor:pointer;font-weight:700}.btn[disabled]{opacity:.45;cursor:not-allowed}
    .btn-primary{background:linear-gradient(135deg,#0284C7,#06B6D4);color:#fff}.btn-ghost{background:#071221;color:#cbd5e1;border:1px solid #24364f}.btn-danger{background:#3a1118;color:#fecaca;border:1px solid #7f1d1d}.btn-print{background:#f8fafc;color:#0f172a;border:1px solid #cbd5e1}
    .input,.select,.textarea{width:100%;background:#071221;border:1px solid #2D3F58;color:#E2E8F0;border-radius:10px;padding:9px 11px;outline:none}
    .textarea{min-height:86px;resize:vertical}
    .week-day-link{display:block;width:100%;background:transparent;border:none;color:#06B6D4;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:2px 0 4px;cursor:pointer}
    .week-clear-btn{display:block;width:100%;background:#2a0f15;border:1px solid #7f1d1d;color:#fecaca;border-radius:8px;padding:5px 4px;font-size:10px;font-weight:700;cursor:pointer}
    .week-clear-placeholder{display:block;width:100%;border:1px solid #24364f;color:#64748B;border-radius:8px;padding:5px 4px;font-size:10px;font-weight:700}
    .week-scroll{overflow-x:auto;overflow-y:hidden;background:#0B1629;border-radius:14px;border:1px solid #1A3050;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
    .week-canvas{width:100%}
    .week-head-row{display:flex;border-bottom:1px solid #1A3050}
    .week-corner{width:96px;flex:0 0 96px;position:sticky;left:0;z-index:7;background:#0B1629}
    .week-day-head{padding:6px 4px 7px;text-align:center;border-right:1px solid #1A3050;display:flex;flex-direction:column;gap:4px;justify-content:flex-start}
    .week-day-head:last-child{border-right:none}
    .week-body-row{display:flex}
    .time-col{width:96px;flex:0 0 96px;border-right:1px solid #1A3050;background:#060E1A;position:sticky;left:0;z-index:6}
    .time-cell{height:42px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:12px;padding-top:3px;font-size:18px}
    .time-cell.major{border-bottom:1px solid #1A2A40;color:#67E8F9;font-weight:800}
    .time-cell.minor{border-bottom:1px solid #0F1E30;color:#7DD3FC}
    .day-col{position:relative;border-right:1px solid #1A3050}.day-col:last-child{border-right:none}
    .slot-cell{height:42px;cursor:pointer}
    .slot-cell.major{border-bottom:1px solid #1A2A40;background:rgba(255,255,255,0.008)}
    .slot-cell.minor{border-bottom:1px solid #0F1E30;background:transparent}
    .slot-cell:hover{background:rgba(6,182,212,0.07)!important}
    .pool-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .pool-tab{padding:7px 13px;border:1px solid #274060;background:#081525;color:#cbd5e1;font-weight:700;border-radius:999px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:6px}
    .pool-tab:hover{border-color:#3D5577}
    .pool-tab.active{background:linear-gradient(135deg,#0284C7,#06B6D4);color:#fff;border-color:#06B6D4;box-shadow:0 2px 8px rgba(6,182,212,0.25)}
    .pool-tab-cap{font-size:10px;opacity:.78;font-weight:600}
    .event-pool-pill{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.3px;padding:0 4px;border-radius:5px;background:rgba(8,59,84,0.85);color:#bae6fd;margin-right:4px;vertical-align:baseline;text-transform:uppercase}
    /* ── Shared navigation band ── */
    .view-head{margin-bottom:14px}
    .view-title{font-size:18px;font-weight:800;letter-spacing:-.2px}
    .period-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .period-nav-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .period-stepper{display:inline-flex;align-items:stretch;background:#081525;border:1px solid #274060;border-radius:11px;overflow:hidden}
    .step-btn{background:transparent;border:none;color:#9fb4cc;font-size:20px;font-weight:700;line-height:1;padding:0 15px;cursor:pointer;display:flex;align-items:center}
    .step-btn:hover{background:rgba(6,182,212,0.12);color:#e2e8f0}
    .period-label{display:flex;align-items:center;justify-content:center;padding:9px 18px;font-weight:800;font-size:13px;color:#e2e8f0;border-left:1px solid #274060;border-right:1px solid #274060;white-space:nowrap;min-width:182px;letter-spacing:.2px}
    .today-btn{background:#071221;border:1px solid #274060;color:#cbd5e1;border-radius:11px;padding:9px 15px;font-weight:700;font-size:12px;cursor:pointer}
    .today-btn:hover:not(:disabled){border-color:#3D5577;color:#e2e8f0}
    .today-btn.is-current,.today-btn:disabled{opacity:.45;cursor:default}
    .period-nav-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .nav-note{font-size:12px;color:#64748B;margin-bottom:12px}
    .print-wrap{position:relative;display:inline-block}
    .caret{font-size:10px;opacity:.7;margin-left:2px}
    .menu-backdrop{position:fixed;inset:0;z-index:40}
    .drop-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:41;background:#0B1629;border:1px solid #274060;border-radius:11px;padding:5px;min-width:210px;box-shadow:0 14px 34px rgba(0,0,0,0.55)}
    .drop-item{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;background:transparent;border:none;color:#e2e8f0;padding:9px 11px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px}
    .drop-item:hover{background:rgba(6,182,212,0.12)}
    .drop-hint{font-size:11px;font-weight:500;color:#64748B}
    /* ── Full-width weekly agenda ── */
    .wagenda{display:grid;grid-template-columns:62px repeat(7,minmax(0,1fr));background:#0B1629;border:1px solid #1A3050;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
    .wa-corner{background:#060E1A;border-bottom:1px solid #1A3050}
    .wa-dayhead{background:#0B1629;border-bottom:1px solid #1A3050;border-left:1px solid #1A3050;padding:6px 5px 7px;display:flex;flex-direction:column;gap:5px;text-align:center}
    .wa-time{background:#060E1A;border-bottom:1px solid #0F1E30;border-right:1px solid #1A3050;color:#67E8F9;font-weight:700;font-size:12.5px;letter-spacing:.2px;white-space:nowrap;display:flex;align-items:flex-start;justify-content:flex-end;padding:8px 9px 0 4px}
    .wa-cell{border-bottom:1px solid #0F1E30;border-left:1px solid #14253B;padding:5px;display:flex;flex-direction:column;gap:5px;min-height:46px;cursor:pointer}
    .wa-cell:hover{background:rgba(6,182,212,0.045)}
    .wa-card{border-radius:8px;padding:6px 8px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.18)}
    .wa-card.event-over{box-shadow:0 0 0 1.5px rgba(220,38,38,0.55) inset}
    .wa-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
    .wa-card-title{font-size:12.5px;font-weight:800;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis}
    .wa-card-line{font-size:11px;line-height:1.35;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .wa-card-inst{font-weight:800;opacity:1}
    .wa-card-students{display:grid;grid-template-columns:1fr 1fr;column-gap:8px;row-gap:0;margin-top:3px}
    .wa-stu{font-size:10.5px;line-height:1.45;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wa-card-students-empty{font-size:10.5px;opacity:.6;margin-top:3px}
    .event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
    .event-head .event-title{flex:1;min-width:0}
    .cap-chip{flex-shrink:0;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;border:1px solid transparent;line-height:1.35;letter-spacing:.3px;white-space:nowrap}
    .cap-chip-lg{font-size:13px;padding:4px 10px;border-radius:999px;line-height:1.2;border-width:1px;border-style:solid}
    .cap-chip-unknown{background:#1f2937;color:#cbd5e1;border-color:#334155}
    .event.event-over{box-shadow:0 0 0 1px rgba(220,38,38,0.45) inset, 0 2px 10px rgba(220,38,38,0.22)!important}
    .pool-badge{display:inline-block;padding:2px 7px;border-radius:999px;background:#0b3b54;color:#ecfeff;font-size:10px;font-weight:700;margin-left:6px;vertical-align:middle}
    .cap-preview{display:flex;align-items:center;gap:10px;background:#081525;border:1px solid #1A3050;border-radius:10px;padding:9px 11px;min-height:42px}
    .lesson-row{display:flex;flex-direction:column;gap:0}
    .lesson-edit{background:#060E1A;border:1px solid #1A3050;border-radius:10px;padding:12px;margin-top:6px}
    .btn.small{padding:5px 10px;font-size:11px;border-radius:8px}
    .event{position:absolute;padding:4px 7px;overflow:hidden;cursor:pointer;z-index:4;box-sizing:border-box;border-radius:0 7px 7px 0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .event-title{font-size:12px;font-weight:800;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.event-sub{font-size:10px;opacity:.86;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid transparent}
    .grid{display:grid;gap:16px}.grid-2{grid-template-columns:1.25fr .75fr}.grid-3{grid-template-columns:repeat(3,1fr)}
    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.month-dow{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#06B6D4;font-weight:800;padding:0 4px 2px}
    .day-box{min-height:122px;background:#091425;border:1px solid #1A3050;border-radius:14px;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:8px;transition:.15s ease}
    .day-box:hover{transform:translateY(-1px);border-color:#255585}.day-box.outside{opacity:.35}.day-box.selected{outline:2px solid rgba(6,182,212,.55);border-color:#0ea5e9}
    .day-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.day-num{font-size:14px;font-weight:800}.remark-dot{font-size:11px;padding:2px 7px;border-radius:999px;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;line-height:1;min-width:58px;height:22px}.remark-dot.empty{background:rgba(148,163,184,.14);color:rgba(148,163,184,.72);border-color:rgba(148,163,184,.28);height:13px;min-width:58px;padding:0 7px;font-size:9px}.remark-dot.has-content{background:#2b1221;color:#fecdd3;border-color:#b91c1c}
    .mini-item{font-size:10px;padding:4px 6px;border-radius:8px;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    table{width:100%;border-collapse:collapse}.table-wrap{overflow:auto;border:1px solid #1A3050;border-radius:12px}
    th,td{padding:10px;border-bottom:1px solid #0F1E30;font-size:12px;text-align:left;vertical-align:top} thead th{background:#091425;color:#8fb7cf;font-size:11px;text-transform:uppercase;letter-spacing:.8px}
    tr:last-child td{border-bottom:none}
    .settings-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.settings-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .row-item{display:flex;gap:8px;align-items:center;justify-content:space-between;background:#081525;border:1px solid #1A3050;border-radius:10px;padding:10px}.empty{padding:20px;text-align:center;color:#42516a}
    .modal-backdrop{position:fixed;inset:0;background:rgba(3,8,15,.72);display:grid;place-items:center;padding:18px;z-index:60}.modal-card{width:min(900px,100%);background:#071221;border:1px solid #27405f;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.55)}
    .modal-head{padding:14px 16px;border-bottom:1px solid #1A3050;display:flex;justify-content:space-between;align-items:center}.modal-body{padding:16px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#64748B;font-weight:800;margin-bottom:5px}
    .hint{font-size:11px;color:#64748B;margin-top:4px}
    .student-box{border:1px solid #1A3050;background:#081525;border-radius:12px;padding:10px;margin-top:10px}
    .student-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #102238}.student-row:last-child{border-bottom:none}

    .daily-day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .daily-day-tab{padding:7px 13px;border-radius:999px;border:1px solid #274060;background:#081525;color:#cbd5e1;cursor:pointer;font-weight:700;font-size:12px}
    .daily-day-tab:hover{border-color:#3D5577}
    .daily-day-tab.active{background:linear-gradient(135deg,#0284C7,#06B6D4);color:#fff;border-color:#06B6D4;box-shadow:0 2px 8px rgba(6,182,212,0.25)}
    .daily-grid{border:1px solid #1A3050;border-radius:12px;overflow:hidden}
    .daily-row{display:grid;grid-template-columns:110px 1fr;min-height:72px;border-bottom:1px solid #0F1E30}
    .daily-row:last-child{border-bottom:none}
    .daily-time{padding:12px 14px;background:#060E1A;color:#67E8F9;font-size:18px;font-weight:800;border-right:1px solid #1A3050}
    .daily-slot{padding:10px 12px;background:#091425}
    .daily-slot.empty{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .daily-sessions{display:flex;flex-direction:column;gap:8px}
    .daily-event{border:1px solid #274060;border-left:4px solid #22d3ee;border-radius:10px;padding:10px 12px;background:#081525;cursor:pointer}
    .daily-event-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .daily-event-title{font-size:16px;font-weight:800}
    .daily-event-sub{font-size:14px;color:#cbd5e1;margin-top:2px}
    .student-count{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 8px;border-radius:999px;background:#0b3b54;color:#ecfeff;font-size:12px;font-weight:800}

    .error-card{margin-top:16px;background:#2a0f15;border-color:#7f1d1d;color:#fecaca}
    .print-week{display:none}.print-rundown{display:none}.print-daily{display:none}.print-weekly-table{display:none}
    @page{size:A4 portrait;margin:8mm}
    @media print{
      @page{size:A4 portrait;margin:8mm}
      body{background:#fff !important;color:#000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      *{box-shadow:none !important;text-shadow:none !important}
      .header,.wrap > .card,.legend,.small.subtle,.modal-backdrop,.btn,.tabs,.print-target,.daily-grid,.daily-day-tabs,.pill,.daily-screen-header{display:none !important}
      .wrap{max-width:none !important;padding:0 !important}
      .print-rundown,.print-daily,.print-weekly-table{display:none !important}
      body[data-print-view="weekly"] .print-rundown{display:block !important;background:#fff !important;color:#000 !important}
      body[data-print-view="daily"] .print-daily{display:block !important;background:#fff !important;color:#000 !important}
      body[data-print-view="weekly-table"] .print-weekly-table{display:block !important;background:#fff !important;color:#000 !important}
      .print-title{font-size:15pt;font-weight:800;margin-bottom:3mm;color:#000 !important}
      .print-meta{font-size:11pt;margin-bottom:4mm;color:#000 !important}
      .print-day{margin-bottom:4mm;break-inside:avoid}
      .print-day h3{font-size:11pt;margin:0 0 2mm;color:#000 !important}
      .print-rundown table,.print-daily-table{width:100%;border-collapse:collapse;table-layout:fixed}
      .print-rundown th,.print-rundown td,.print-daily-table th,.print-daily-table td{border:1px solid #000 !important;padding:4px 5px;font-size:11pt;color:#000 !important;background:#fff !important;vertical-align:top;word-wrap:break-word}
      .print-rundown thead th,.print-daily-table thead th{background:#fff !important;color:#000 !important;text-transform:none;font-size:11pt;letter-spacing:0;font-weight:800}
      .print-rundown .empty-row td{text-align:center;color:#000 !important}
      .print-time-cell{white-space:nowrap}
      .print-type-cell{white-space:nowrap;font-size:10.5pt}
      .print-session-head{font-size:11pt;font-weight:700;color:#000 !important;line-height:1.25}
      .print-session-students{font-size:11pt;color:#000 !important;line-height:1.25;margin-top:2px}
      .print-session-gap{height:10px}
      .print-daily{transform:scale(.93);transform-origin:top left;width:107.5%}

      /* ── Weekly Table Grid Print ── */
      .wt-header{margin-bottom:3mm}
      .wt-title{font-size:14pt;font-weight:800;color:#000 !important;margin-bottom:1mm}
      .wt-meta{font-size:8.5pt;color:#000 !important;margin-bottom:0}
      .wt-table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:8pt;color:#000 !important;height:255mm}
      .wt-th-time{width:18mm;border:1.5px solid #000;padding:4px 5px;background:#e8e8e8 !important;font-size:8pt;font-weight:800;color:#000 !important;text-align:center;vertical-align:middle}
      .wt-th-day{border:1.5px solid #000;padding:4px 5px;background:#e8e8e8 !important;text-align:center;vertical-align:middle}
      .wt-th-dayname{font-size:10pt;font-weight:800;color:#000 !important;line-height:1.2}
      .wt-th-daydate{font-size:8pt;font-weight:400;color:#333 !important;line-height:1.2}
      .wt-time-cell{width:18mm;border:1px solid #999;padding:3px 5px;vertical-align:middle;white-space:nowrap;background:#f5f5f5 !important;color:#000 !important;font-size:8pt;text-align:right;min-height:10mm;height:10mm}
      .wt-hour-row .wt-time-cell{border-top:1.5px solid #000;background:#ebebeb !important}
      .wt-half-label{color:#555 !important;font-size:7.5pt}
      .wt-cell{border:1px solid #ccc;padding:3px 5px;vertical-align:top;min-height:10mm;height:10mm}
      .wt-hour-row .wt-cell{border-top:1.5px solid #000}
      .wt-session-cell{background:#fafafa !important}
      .wt-sess{padding:1px 0}
      .wt-sess-sep{border-top:1px dashed #aaa;margin-top:2px;padding-top:2px}
      .wt-sess-type{font-size:9pt;font-weight:800;color:#000 !important;line-height:1.3}
      .wt-sess-meta{font-size:7.5pt;color:#333 !important;line-height:1.3}
      .wt-sess-students{font-size:7.5pt;color:#444 !important;line-height:1.3;word-break:break-word}
      .wt-cont-cell{background:#f9f9f9 !important;text-align:center;vertical-align:middle}
      .wt-cont-bar{color:#bbb !important;font-size:9pt;line-height:1}
      .wt-empty-cell{background:#fff !important}
    }
