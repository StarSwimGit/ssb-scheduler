    .billing-warn{font-size:11px;color:var(--amber-tx);margin-top:3px;font-weight:600}
    .billing-info{font-size:11px;color:#065F46;margin-top:3px;font-style:italic}
    .billing-warning-box{padding:11px 13px;background:#FEF3C7;border:1px solid #FCD34D;border-left:3px solid #F59E0B;border-radius:6px;margin-bottom:12px}
    .billing-warning-title{font-size:12px;font-weight:800;color:#92400E;margin-bottom:5px}
    .billing-warning-body{font-size:12px;color:#854D0E;line-height:1.5}
    .billing-warning-body strong{color:#78350F}
    /* Inline payment recorder — appears beneath the billing row being paid */
    .billing-recorder{padding:11px 13px;background:#EFF6FF;border-left:3px solid var(--primary);border-top:1px dashed var(--border-2)}
    .billing-recorder-title{font-size:11.5px;color:#1E3A8A;margin-bottom:8px}
    .billing-recorder-grid{display:grid;grid-template-columns:repeat(4, minmax(0, 1fr));gap:8px;margin-bottom:6px}
    .billing-recorder .field{margin:0}
    .billing-recorder .field label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px;display:block}
    @media (max-width: 700px){ .billing-recorder-grid{grid-template-columns:repeat(2, minmax(0, 1fr))} }
    .billing-total-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;margin-top:12px;background:#0C2340;color:#fff;border-radius:6px}
    .billing-total-label{font-size:12px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;color:#67E8F9}
    .billing-total-value{font-size:18px;font-weight:800;letter-spacing:-.3px}

    /* Referral & Discount Codes panel (Settings → Codes) */
    .codes-filter-pill{background:transparent;border:none;padding:6px 12px;font-size:12px;font-weight:700;color:var(--text-3);cursor:pointer;border-radius:4px;transition:.12s}
    .codes-filter-pill:hover{background:var(--surface-2)}
    .codes-filter-pill.active{background:var(--primary);color:#fff}
    .codes-type-toggle{flex:1;background:transparent;border:none;padding:8px 14px;font-size:12px;font-weight:700;color:var(--text-3);cursor:pointer;border-radius:4px;transition:.12s;white-space:nowrap}
    .codes-type-toggle:hover{background:var(--surface)}
    .codes-type-toggle.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .codes-table tbody tr:hover{background:var(--surface-2)}
    .code-status-pill{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:2px 8px;border-radius:4px}
    .code-status-green{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
    .code-status-red{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
    .code-status-blue{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD}
    .code-status-grey{background:var(--surface-3);color:var(--text-3);border:1px solid var(--border-2)}

    /* Archived parent visuals — dim the card, badge in header */
    .parent-card.is-archived{opacity:0.62;background:#FAFAFC}
    .parent-card.is-archived .parent-name{color:var(--text-2)}
    .parent-archived-badge{display:inline-block;font-size:9.5px;font-weight:800;background:var(--surface-3);color:var(--text-2);border:1px solid var(--border-2);border-radius:4px;padding:2px 7px;margin-left:8px;text-transform:uppercase;letter-spacing:.4px;vertical-align:middle}
    /* First-level archive/restore button — sits in the card header, no expand needed */
    .parent-archive-btn{font-size:11px !important;padding:3px 8px !important;opacity:.6;transition:opacity .15s ease}
    .parent-archive-btn:hover{opacity:1}
    /* daily-event drag-to-reorder — handle-only, card click stays clean */
    .daily-drag-handle{position:absolute;top:6px;right:6px;width:16px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-3);cursor:grab;opacity:0;transition:opacity .15s ease;user-select:none;border-radius:3px;line-height:1}
    .daily-event:hover .daily-drag-handle{opacity:.5}
    .daily-drag-handle:hover{opacity:1 !important;color:var(--text-2);background:rgba(0,0,0,.06)}
    .daily-drag-handle:active{cursor:grabbing}
    .daily-event.daily-event-dragging{opacity:0.35;box-shadow:none}
    .daily-event.daily-event-dragover{outline:2px solid var(--primary);outline-offset:-2px;box-shadow:0 0 0 4px rgba(109,91,208,.15)}
    /* Session jump link — schedule label in swimmer enrolment table */
    .session-jump-link{color:var(--text);font-weight:600;font-size:12px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--primary);text-underline-offset:2px;transition:color .1s ease}
    .session-jump-link:hover{color:var(--primary)}    .esc-warn-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 14px;background:#1a0d00;border-bottom:1px solid #F59E0B;font-size:12px;color:#FCD34D;flex-wrap:wrap}
    .acct-session-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.18);margin-right:7px;vertical-align:middle;flex-shrink:0}
    @keyframes dot-pulse{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.05)}}
    .acct-session-dot{animation:dot-pulse 2.4s ease-in-out infinite}
    /* Cross-filter search notice — shown when results exist in another status bucket */
    .cross-filter-notice{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 14px;background:#1a2a10;border:1px solid #3a5a20;border-radius:8px;margin-bottom:6px;font-size:12.5px;flex-wrap:wrap;color:#CBD5E1}
    .cross-filter-notice strong{font-weight:800;color:#D4F5C0}

    /* RecordPurchaseForm */
    .record-purchase-form{padding:11px 13px;background:#fff;border:1px solid var(--border-2);border-radius:8px;margin-bottom:10px}
    .record-purchase-swimmers{display:flex;flex-direction:column;gap:4px;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:6px}
    .record-purchase-swimmer{display:inline-flex;gap:6px;align-items:center;font-size:12px;cursor:pointer}
    .record-purchase-swimmer input{margin:0}
    .record-purchase-hint{padding:7px 10px;background:#FFFBEB;border:1px solid #FCD34D;border-radius:6px;margin-top:8px;font-size:11px;color:#92400E;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .record-purchase-pax-chip{display:inline-block;font-size:10.5px;font-weight:700;background:#fff;border:1px solid var(--border-2);border-radius:4px;padding:2px 7px}
    .record-purchase-pricing{padding:9px 12px;background:#F0F9FF;border:1px solid #BFDBFE;border-radius:6px;margin-top:8px}
    .record-purchase-pricing.is-discount{background:#ECFDF5;border-color:#86EFAC}
    .record-purchase-total{font-size:16px;color:#1E40AF;font-weight:800}
    .record-purchase-pricing.is-discount .record-purchase-total{color:#065F46}
    .record-purchase-note{margin-top:2px;font-size:11px;line-height:1.4}
    .record-purchase-subject{font-style:italic}

    /* BalanceAdjuster — inline "set balance to N" widget */
    .balance-adjust-form{display:inline-flex;align-items:center;gap:4px}
    .balance-adjust-label{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px}

    /* ════════════════════════════════════════════════════════════════
       Accounts page — visual hierarchy
       ────────────────────────────────────────────────────────────────
       Two visible levels only:
         (1) the account card (outer container)
         (2) the swimmer section (left accent bar, no inner box)
       LT rows and admin elements sit flat inside (2) — dashed dividers
       instead of nested boxes. The body uses a faint teal tint that
       ties back to the brand cyan in the logo + header. Action panels
       (Edit Contact, Add Swimmer, Group Manager, Record Purchase) keep
       a single shared light-blue style so they read as siblings, not
       a stack of unrelated mini-cards. */

    .parent-card{background:var(--surface);border:2px solid var(--border-2);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(28,28,43,.07)}
    .parent-card:hover{box-shadow:0 3px 12px rgba(28,28,43,.1);border-color:#D4D4E6}
    .parent-head{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;transition:.12s ease}
    .parent-head:hover{background:#F8FAFC}
    .parent-head-main{flex:1;min-width:0}
    .parent-name{font-size:14.5px;font-weight:800;color:var(--text)}
    .parent-contact{margin-top:3px;font-size:11.5px;line-height:1.5}
    .parent-head-stats{display:flex;gap:14px;align-items:center;flex-wrap:wrap;flex-shrink:0}
    .parent-stat{font-size:12px;color:var(--text-2)}
    .parent-stat strong{color:var(--text);font-weight:800;font-size:13px}
    .parent-chev{font-size:14px;color:var(--text-3);margin-left:4px}

    /* Body — single light teal-tinted surface; no second-level box. */
    .parent-body{border-top:1px solid var(--border);background:#F6FBFC;padding:12px 16px 14px}

    /* Admin toolbar — pill-shaped, flush against the body bg. */
    .parent-admin-toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:7px 10px;background:var(--surface);border:1px solid var(--border-2);border-radius:8px;margin-bottom:10px}

    /* Action panels (edit/add/group/purchase) — unified light style so
       they feel like one type of UI, not four different cards. */
    .parent-contact-edit,.parent-add-swimmer,.parent-group-panel,.record-purchase-form{padding:11px 13px;background:var(--surface);border:1px solid #BFDBFE;border-left:3px solid var(--primary);border-radius:6px;margin-bottom:10px}

    .parent-group-block{padding:8px 10px;background:#F8FAFC;border:1px solid var(--border-2);border-radius:6px;margin-bottom:6px}
    .parent-group-members{display:flex;gap:8px;flex-wrap:wrap}
    .parent-group-member{display:inline-flex;gap:5px;align-items:center;font-size:12px;cursor:pointer;padding:3px 7px;background:var(--surface);border:1px solid var(--border-2);border-radius:5px}
    .parent-group-member input{margin:0}
    .parent-group-create{padding:8px 10px;background:#F0F9FF;border:1px solid #BFDBFE;border-radius:6px}
    .parent-group-tag{display:inline-block;font-size:10px;font-weight:700;background:var(--surface-3);border:1px solid var(--border-2);border-radius:4px;padding:1px 6px;margin-left:5px}

    /* Swimmer section — the key visual change. A 4px colored left bar
       cycles through SWIMMER_ACCENTS so each swimmer has a stable
       identity color. No box, no border, no fill — just the bar + the
       coloured name. Dashed separator between consecutive swimmers. */
    .parent-swimmer-section{position:relative;padding:6px 10px 6px 12px;border-left:3px solid var(--border-2);margin:0;background:var(--surface-2);border-radius:0 6px 6px 0;border:1px solid var(--border);border-left:3px solid var(--border-2)}
    .parent-swimmer-section + .parent-swimmer-section{margin-top:4px}
    .parent-swimmer-head{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
    .parent-swimmer-name{font-size:12.5px}
    .parent-swimmer-name strong{font-weight:800}
    .parent-swimmer-actions{display:flex;gap:3px;flex-shrink:0}
    .parent-swimmer-empty{padding:2px 0;font-size:11px;color:var(--text-2)}

    /* ── Mini enrolment table ──────────────────────────────────────── */
    .lt-mini-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:2px}
    .lt-mini-table th{text-align:left;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);padding:3px 10px 4px 0;border-bottom:1.5px solid var(--border-2);white-space:nowrap}
    .lt-mini-table th:last-child{padding-right:0}
    .lt-mini-table td{padding:5px 10px 5px 0;vertical-align:middle;border-bottom:1px solid var(--border);white-space:nowrap}
    .lt-mini-table tbody tr:last-child td{border-bottom:none}
    .lt-mini-table .col-session{color:var(--text);font-weight:600;font-size:12px}
    .lt-mini-table .col-session.no-sched{color:var(--text-3);font-weight:400;font-style:italic}
    .lt-mini-table .col-credits strong{font-weight:800;color:var(--text)}
    .lt-mini-table .col-credits .credit-low{color:#C0392B}
    .lt-mini-table .col-actions{text-align:right;white-space:nowrap}
    .lt-mini-table .col-actions .btn{padding:2px 7px !important;font-size:10.5px !important}
    .lt-chip{display:inline-block;padding:2px 8px;border:1px solid;border-radius:4px;font-size:10.5px;font-weight:800;white-space:nowrap}
    .col-pkg{color:var(--text-2);font-size:11.5px}

    /* T&C strip — single horizontal line, no contained box look. */
    .account-tc-summary{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:6px 10px;background:transparent;border:none;border-bottom:1px dashed var(--border-2);margin:-4px -2px 9px;font-size:11px}
    .account-tc-label{font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);font-size:10px}
    .account-tc-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;border:1px solid transparent}
    .account-tc-badge.tc-ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx)}
    .account-tc-badge.tc-pending{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx)}

    /* Subscription log — compact, flat rows. */
    .parent-sub-log{margin-top:10px;padding-top:8px;border-top:1px dashed var(--border-2)}
    .parent-sub-log-title{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
    .parent-sub-log-list{display:flex;flex-direction:column;gap:3px}

    /* Schedule cell — clickable link per lesson-type line. Visually a
       text row with a subtle ↗ arrow on hover; links to the current
       week (if the swimmer has a session there) or the earliest future
       week with that LT scheduled. */
    .swimmer-sched-link{display:block;width:100%;padding:2px 4px;margin-bottom:2px;background:transparent;border:1px solid transparent;border-radius:4px;text-align:left;font-size:11px;cursor:pointer;color:inherit;font-family:inherit;transition:.12s ease;position:relative}
    .swimmer-sched-link:hover{background:#EFF6FF;border-color:#BFDBFE;color:#1E40AF}
    .swimmer-sched-link:hover .subtle{color:#1E40AF}
    .swimmer-sched-arrow{display:inline-block;margin-left:4px;font-size:10px;opacity:0;color:#3B82F6;transition:.12s ease;font-weight:800}
    .swimmer-sched-link:hover .swimmer-sched-arrow{opacity:1}

    /* Per-LT credit chip in the read-only Swimmers directory */
    .swimmer-cred-chip{display:inline-block;font-size:10.5px;padding:1px 6px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:4px;line-height:1.4;white-space:nowrap}
    .swimmer-cred-chip strong{font-weight:800;color:var(--text)}
    .swimmer-cred-chip strong.credit-low{color:var(--red-tx)}

    /* Trial annotation — drawn from the swimmer's package (any package whose
       name contains "trial"). Pill in the modal slot, subtle mark in cards. */
    .trial-pill{display:inline-flex;align-items:center;height:22px;padding:0 7px;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;border-radius:5px;white-space:nowrap;align-self:center;flex:0 0 auto}
    .trial-mark{font-size:11px;font-weight:700;color:#B91C1C;letter-spacing:.2px}
    .wa-stu .trial-mark{font-size:10px}
    .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;padding:3px;gap:3px}
    .seg-btn{border:none;background:transparent;color:var(--text-2);font-weight:700;font-size:12px;padding:7px 14px;border-radius:7px;cursor:pointer}
    .seg-btn.on{background:var(--primary);color:#fff}
    .suffix-input{position:relative;display:inline-flex;align-items:center}
    .suffix-input .input{width:140px;padding-right:70px}
    .suffix-tag{position:absolute;right:11px;color:var(--text-3);font-size:12px;font-weight:600;pointer-events:none}
    .gb-check{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer}
    .gb-check input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
    .gb-card{border:1px solid var(--border-2);border-radius:14px;padding:14px;background:var(--surface-2)}
    .gb-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .gb-status{margin-top:10px;padding:8px 12px;border-radius:10px;font-size:12.5px;font-weight:700;border:1px solid transparent}
    .gb-ok{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd)}
    .gb-warn{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd)}
    .gb-amber{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd)}
    .gb-dim{background:#F0F0F5;color:var(--text-2);border-color:var(--border-2)}
    .gb-edit{margin-top:10px;padding:10px;border:1px dashed var(--border-2);border-radius:10px;background:var(--surface)}
    .gb-members{margin-top:10px;display:flex;flex-direction:column;gap:4px}
    .gb-member{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;font-size:13px}
    .gb-noclass{color:var(--amber-tx);font-size:11px;font-weight:600}
    .gb-add{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
    .student-box{border:1px solid var(--border);background:var(--surface-2);border-radius:12px;padding:10px;margin-top:10px}
    .student-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}.student-row:last-child{border-bottom:none}
    .daily-day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .daily-day-tab{padding:7px 14px;border-radius:999px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);cursor:pointer;font-weight:600;font-size:12px}
    .daily-day-tab:hover{border-color:#CFCFDE;color:var(--text)}
    .daily-day-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(109,91,208,0.25)}
    .daily-grid{border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .daily-row{display:grid;grid-template-columns:140px 1fr;min-height:72px;border-bottom:1px solid var(--border)}
    .daily-row:last-child{border-bottom:none}
    .daily-time{padding:12px 16px;background:var(--surface-3);color:var(--text-2);font-size:18px;font-weight:800;border-right:1px solid var(--border);white-space:nowrap}
    .daily-slot{padding:10px 12px;background:var(--surface)}
    .daily-slot.empty{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .daily-sessions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-items:start}
    .daily-event{border:1px solid rgba(0,0,0,0.06);border-left:6px solid var(--primary);border-radius:11px;padding:11px 13px;background:var(--surface-2);cursor:pointer;transition:transform .08s ease, box-shadow .12s ease}
    .daily-event:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .daily-event-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .daily-event-title{font-size:15px;font-weight:800;line-height:1.2}
    .daily-event-sub{font-size:13px;color:currentColor;opacity:.82;margin-top:3px;font-weight:600}
    .daily-event-students{display:flex;flex-direction:column;gap:2px;margin-top:6px}
    .daily-event-stu{font-size:13px;line-height:1.35;color:currentColor;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
    .daily-event-note{font-size:12.5px;color:var(--amber-tx);font-weight:700;margin-top:4px;background:rgba(255,255,255,0.55);padding:2px 7px;border-radius:6px;display:inline-block}
    .student-count{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary-on-soft);font-size:12px;font-weight:800}
    .error-card{margin-top:16px;background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx)}
    .print-week{display:none}.print-rundown{display:none}.print-daily{display:none}.print-weekly-table{display:none}
    @page{size:A4 portrait;margin:8mm}
    @media print{
      @page{size:A4 portrait;margin:8mm}
      body{background:#fff !important;color:#000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      *{box-shadow:none !important;text-shadow:none !important}
      .header,.wrap > .card,.legend,.small.subtle,.modal-backdrop,.btn,.tabs,.print-target,.daily-grid,.daily-day-tabs,.pill,.daily-screen-header{display:none !important}
      .wrap{max-width:none !important;padding:0 !important}
      .print-rundown,.print-daily,.print-weekly-table{display:none !important}
      body[data-print-view="weekly"] .print-rundown{display:block !important;background:#fff !important;color:#000 !important}
      body[data-print-view="daily"] .print-daily{display:block !important;background:#fff !important;color:#000 !important}
      body[data-print-view="weekly-table"] .print-weekly-table{display:block !important;background:#fff !important;color:#000 !important}
      .print-title{font-size:15pt;font-weight:800;margin-bottom:3mm;color:#000 !important}
      .print-meta{font-size:11pt;margin-bottom:4mm;color:#000 !important}
      .print-day{margin-bottom:4mm;break-inside:avoid}
      .print-day h3{font-size:11pt;margin:0 0 2mm;color:#000 !important}
      /* ── no-print: hides screen-only elements (e.g. DailyView card) ── */
      .no-print{display:none !important}

      /* ── Shared print base ───────────────────────────────────────── */
      .print-title{font-size:20pt;font-weight:800;color:#000 !important;margin-bottom:1mm;letter-spacing:-.3px;line-height:1.2}
      .print-meta{font-size:10pt;color:#555 !important;margin-bottom:6mm;font-weight:400}

      /* ── Weekly Daily Rundown ────────────────────────────────────── */
      .print-rundown,.print-rundown *{color:#000 !important;background:#fff !important}
      .print-rundown table{width:100%;border-collapse:collapse;margin-top:0}
      .print-rundown thead th{font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#444 !important;border-bottom:1.5px solid #000;padding:5px 8px;background:#fff !important}
      .print-rundown tbody td{font-size:10.5pt;padding:6px 8px;border-bottom:1px solid #e0e0e0;vertical-align:top;line-height:1.4}
      .print-rundown tbody tr:last-child td{border-bottom:none}
      .print-rundown .empty-row td{color:#999 !important;font-style:italic;font-size:9.5pt}
      .print-time-cell{white-space:nowrap;font-weight:700;width:15%}
      .print-type-cell{white-space:nowrap;font-size:10.5pt}
      .print-day{margin-bottom:8mm;break-inside:avoid}
      .print-day h3{font-size:12pt;font-weight:800;color:#000 !important;margin:0 0 3mm;padding-bottom:2mm;border-bottom:1.5px solid #000}

      /* ── Daily Schedule printout ─────────────────────────────────── */
      .print-daily{background:#fff !important;color:#000 !important}
      .print-daily-heading{font-size:14pt;font-weight:800;color:#000 !important;margin-bottom:1mm;letter-spacing:-.2px;line-height:1.2}
      .print-daily-date{font-size:9pt;color:#555 !important;margin-bottom:5mm;font-weight:400}
      .print-daily-table{width:100%;border-collapse:collapse}
      .print-th-time{width:10%;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#444 !important;border-bottom:1.5px solid #000;padding:4px 8px 4px 0;background:#fff !important;text-align:left}
      .print-th-detail{font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#444 !important;border-bottom:1.5px solid #000;padding:4px 8px;background:#fff !important;text-align:left}
      .print-time-cell{width:10%;white-space:nowrap;font-size:8.5pt;font-weight:700;color:#000 !important;padding:5px 8px 5px 0;vertical-align:top;border-bottom:1px solid #e8e8e8}
      .print-detail-cell{padding:5px 6px;border-bottom:1px solid #e8e8e8;vertical-align:top}
      /* Fixed 3-column grid — always renders 3 equal slots regardless of session count */
      .print-day-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
      .print-day-col{min-width:0;overflow:hidden}
      .print-day-col-empty{border-right:none}
      .print-session-head{font-size:8.5pt;font-weight:800;color:#000 !important;line-height:1.3;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .print-session-meta{font-size:7.5pt;color:#555 !important;line-height:1.3;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .print-student-name{font-size:8pt;color:#222 !important;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .print-student-empty{color:#999 !important;font-style:italic}
      .print-no-session{font-size:8pt;color:#ccc !important;font-style:italic}
      .print-session-gap{height:6px}

      /* ── Weekly Table Grid Print ── */
      .wt-header{margin-bottom:3mm}
      .wt-title{font-size:14pt;font-weight:800;color:#000 !important;margin-bottom:1mm}
      .wt-meta{font-size:8.5pt;color:#000 !important;margin-bottom:0}
      .wt-table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:8pt;color:#000 !important;height:255mm}
      .wt-th-time{width:18mm;border:1.5px solid #000;padding:4px 5px;background:#e8e8e8 !important;font-size:8pt;font-weight:800;color:#000 !important;text-align:center;vertical-align:middle}
      .wt-th-day{border:1.5px solid #000;padding:4px 5px;background:#e8e8e8 !important;text-align:center;vertical-align:middle}
      .wt-th-dayname{font-size:10pt;font-weight:800;color:#000 !important;line-height:1.2}
      .wt-th-daydate{font-size:8pt;font-weight:400;color:#333 !important;line-height:1.2}
      .wt-time-cell{width:18mm;border:1px solid #999;padding:3px 5px;vertical-align:middle;white-space:nowrap;background:#f5f5f5 !important;color:#000 !important;font-size:8pt;text-align:right;min-height:10mm;height:10mm}
      .wt-hour-row .wt-time-cell{border-top:1.5px solid #000;background:#ebebeb !important}
