<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSB Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#E9E9F1;--surface:#fff;--surface-2:#F4F4FA;--surface-3:#FAFAFB;
      --border:#ECECF3;--border-2:#E1E1EC;
      --text:#1C1C2B;--text-2:#6C6C7E;--text-3:#9C9CAD;
      --primary:#6D5BD0;--primary-press:#5C49C0;--primary-soft:#EEEBFF;--primary-on-soft:#5B49BE;
      --teal:#1FA98F;
      --green-bg:#E4F6EC;--green-tx:#138A53;--green-bd:#BFE8CF;
      --amber-bg:#FCEFD6;--amber-tx:#B45309;--amber-bd:#F2DCA8;
      --red-bg:#FCE7E7;--red-tx:#D63B3B;--red-bd:#F3C9C9;
      --pink-bg:#FCE7F0;--pink-tx:#DB2777;--pink-bd:#F5C9DD;
      --shadow:0 4px 18px rgba(30,27,75,0.06);--shadow-lg:0 12px 34px rgba(30,27,75,0.10);
    }
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit;color:inherit}
    .header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px}
    .header-inner{max-width:1500px;height:62px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#7C5CFC 0%,#6D5BD0 100%);display:grid;place-items:center;font-size:18px;box-shadow:0 4px 14px rgba(109,91,208,0.35)}
    .tabs{display:flex;gap:3px;background:var(--surface-2);border-radius:12px;padding:4px;border:1px solid var(--border);flex-wrap:wrap}
    .tab{padding:7px 15px;border:none;border-radius:9px;background:transparent;color:var(--text-2);font-weight:600;cursor:pointer}
    .tab:hover{color:var(--text)}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(109,91,208,0.30)}
    .wrap{max-width:1500px;margin:0 auto;padding:22px 22px 40px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
    .small{font-size:12px}.muted{color:var(--text-2)}.subtle{color:var(--text-2)}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--border-2);background:var(--surface-2);color:var(--text-2)}
    .btn.small-btn{padding:4px 9px;font-size:11px}
    .btn{border:none;border-radius:11px;padding:9px 14px;cursor:pointer;font-weight:600}.btn[disabled]{opacity:.45;cursor:not-allowed}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(109,91,208,0.28)}.btn-primary:hover:not([disabled]){background:var(--primary-press)}
    .btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border-2)}.btn-ghost:hover{border-color:#CFCFDE}
    .btn-danger{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
    .btn-print{background:var(--surface);color:var(--text);border:1px solid var(--border-2)}.btn-print:hover{border-color:#CFCFDE}
    .input,.select,.textarea{width:100%;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);border-radius:11px;padding:10px 12px;outline:none}
    .input:focus,.select:focus,.textarea:focus{border-color:var(--primary);background:#fff}
    .textarea{min-height:86px;resize:vertical}
    .week-day-link{display:block;width:100%;background:transparent;border:none;color:var(--text);font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:2px 0 4px;cursor:pointer}
    .week-day-link:hover{color:var(--primary)}
    .week-clear-btn{display:block;width:100%;background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red-tx);border-radius:8px;padding:5px 4px;font-size:10px;font-weight:700;cursor:pointer}
    .week-clear-placeholder{display:block;width:100%;border:1px solid var(--border);color:var(--text-3);border-radius:8px;padding:5px 4px;font-size:10px;font-weight:600}
    .week-scroll{overflow-x:auto;overflow-y:hidden;background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
    .week-canvas{width:100%}
    .week-head-row{display:flex;border-bottom:1px solid var(--border)}
    .week-corner{width:96px;flex:0 0 96px;position:sticky;left:0;z-index:7;background:var(--surface)}
    .week-day-head{padding:6px 4px 7px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;justify-content:flex-start}
    .week-day-head:last-child{border-right:none}
    .week-body-row{display:flex}
    .time-col{width:96px;flex:0 0 96px;border-right:1px solid var(--border);background:var(--surface-3);position:sticky;left:0;z-index:6}
    .time-cell{height:42px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:12px;padding-top:3px;font-size:18px}
    .time-cell.major{border-bottom:1px solid var(--border-2);color:var(--text-2);font-weight:700}
    .time-cell.minor{border-bottom:1px solid var(--border);color:var(--text-3)}
    .day-col{position:relative;border-right:1px solid var(--border)}.day-col:last-child{border-right:none}
    .slot-cell{height:42px;cursor:pointer}
    .slot-cell.major{border-bottom:1px solid var(--border-2);background:transparent}
    .slot-cell.minor{border-bottom:1px solid var(--border);background:transparent}
    .slot-cell:hover{background:var(--primary-soft)!important}
    .pool-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .pool-tab{padding:7px 14px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);font-weight:600;border-radius:999px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:6px}
    .pool-tab:hover{border-color:#CFCFDE;color:var(--text)}
    .pool-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(109,91,208,0.25)}
    .pool-tab-cap{font-size:10px;opacity:.8;font-weight:600}
    .event-pool-pill{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.3px;padding:1px 5px;border-radius:5px;background:var(--primary-soft);color:var(--primary-on-soft);margin-right:4px;vertical-align:baseline;text-transform:uppercase}
    .view-head{margin-bottom:14px}
    .view-title{font-size:19px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
    .period-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .period-nav-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .period-stepper{display:inline-flex;align-items:stretch;background:var(--surface);border:1px solid var(--border-2);border-radius:12px;overflow:hidden}
    .step-btn{background:transparent;border:none;color:var(--text-2);font-size:20px;font-weight:700;line-height:1;padding:0 15px;cursor:pointer;display:flex;align-items:center}
    .step-btn:hover{background:var(--primary-soft);color:var(--primary-on-soft)}
    .period-label{display:flex;align-items:center;justify-content:center;padding:9px 18px;font-weight:700;font-size:13px;color:var(--text);border-left:1px solid var(--border-2);border-right:1px solid var(--border-2);white-space:nowrap;min-width:182px;letter-spacing:.2px}
    .today-btn{background:var(--surface);border:1px solid var(--border-2);color:var(--text-2);border-radius:12px;padding:9px 15px;font-weight:600;font-size:12px;cursor:pointer}
    .today-btn:hover:not(:disabled){border-color:#CFCFDE;color:var(--text)}
    .today-btn.is-current,.today-btn:disabled{opacity:.45;cursor:default}
    .period-nav-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .nav-note{font-size:12px;color:var(--text-2);margin-bottom:12px}
    .print-wrap{position:relative;display:inline-block}
    .caret{font-size:10px;opacity:.7;margin-left:2px}
    .menu-backdrop{position:fixed;inset:0;z-index:40}
    .drop-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:41;background:var(--surface);border:1px solid var(--border-2);border-radius:13px;padding:5px;min-width:212px;box-shadow:var(--shadow-lg)}
    .drop-item{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;background:transparent;border:none;color:var(--text);padding:9px 11px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px}
    .drop-item:hover{background:var(--primary-soft);color:var(--primary-on-soft)}
    .drop-hint{font-size:11px;font-weight:500;color:var(--text-3)}
    .wagenda{display:grid;grid-template-columns:62px repeat(7,minmax(0,1fr));background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
    .wa-corner{background:var(--surface-3);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
    .wa-dayhead{background:var(--surface);border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:7px 5px 8px;display:flex;flex-direction:column;gap:5px;text-align:center}
    .wa-time{background:var(--surface-3);border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text-2);font-weight:600;font-size:12.5px;letter-spacing:.2px;white-space:nowrap;display:flex;align-items:flex-start;justify-content:flex-end;padding:8px 9px 0 4px}
    .wa-cell{border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:6px;display:flex;flex-direction:column;gap:5px;min-height:48px;cursor:pointer}
    .wa-cell:hover{background:var(--primary-soft)}
    .wa-card{border-radius:11px;padding:7px 9px;cursor:pointer;box-shadow:0 1px 3px rgba(30,27,75,0.07)}
    .wa-card.event-over{box-shadow:0 0 0 1.5px rgba(214,59,59,0.5) inset}
    .wa-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
    .wa-card-title{font-size:12.5px;font-weight:800;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis}
    .wa-card-line{font-size:11px;line-height:1.35;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .wa-card-inst{font-weight:800;opacity:1}
    .wa-card-students{display:flex;flex-direction:column;gap:0;margin-top:3px}
    .wa-stu{font-size:10.5px;line-height:1.45;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wa-card-students-empty{font-size:10.5px;opacity:.6;margin-top:3px}
    .event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
    .event-head .event-title{flex:1;min-width:0}
    .cap-chip{flex-shrink:0;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;border:1px solid transparent;line-height:1.35;letter-spacing:.3px;white-space:nowrap}
    .cap-chip-lg{font-size:13px;padding:4px 10px;border-radius:999px;line-height:1.2;border-width:1px;border-style:solid}
    .cap-chip-unknown{background:var(--surface-2);color:var(--text-2);border-color:var(--border-2)}
    .event.event-over{box-shadow:0 0 0 1px rgba(214,59,59,0.4) inset, 0 2px 10px rgba(214,59,59,0.18)!important}
    .pool-badge{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary-on-soft);font-size:10px;font-weight:700;margin-left:6px;vertical-align:middle}
    .cap-preview{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:9px 11px;min-height:42px}
    .lesson-row{display:flex;flex-direction:column;gap:0}
    .lesson-edit{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:12px;margin-top:6px}
    .btn.small{padding:5px 10px;font-size:11px;border-radius:9px}
    .event{position:absolute;padding:4px 7px;overflow:hidden;cursor:pointer;z-index:4;box-sizing:border-box;border-radius:0 7px 7px 0;box-shadow:0 2px 8px rgba(30,27,75,.12)}
    .event-title{font-size:12px;font-weight:800;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.event-sub{font-size:10px;opacity:.86;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid transparent}
    .chip-toggle{cursor:pointer;user-select:none;transition:.12s ease}
    .chip-toggle.chip-off{background:var(--surface-2)!important;border-color:var(--border-2)!important;color:var(--text-3)!important;opacity:.85}
    .legend-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
    .legend-allbtn{background:var(--surface);border:1px solid var(--border-2);color:var(--text);border-radius:999px;padding:6px 13px;font-weight:600;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
    .legend-allbtn:hover{border-color:#CFCFDE}
    .legend-allbtn .dot{width:8px;height:8px;border-radius:999px;background:var(--teal)}
    .legend-allbtn.is-off .dot{background:var(--text-3)}
    .grid{display:grid;gap:16px}.grid-2{grid-template-columns:1.25fr .75fr}.grid-3{grid-template-columns:repeat(3,1fr)}
    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.month-dow{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-2);font-weight:700;padding:0 4px 2px}
    .day-box{min-height:122px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px;cursor:pointer;display:flex;flex-direction:column;gap:8px;transition:.15s ease}
    .day-box:hover{transform:translateY(-1px);border-color:#D6D6E6;box-shadow:var(--shadow)}.day-box.outside{opacity:.5}.day-box.selected{outline:2px solid rgba(109,91,208,.45);border-color:var(--primary)}
    .day-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.day-num{font-size:14px;font-weight:800}.remark-dot{font-size:11px;padding:2px 7px;border-radius:999px;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;line-height:1;min-width:58px;height:22px}.remark-dot.empty{background:#F0F0F5;color:var(--text-3);border-color:var(--border-2);height:13px;min-width:58px;padding:0 7px;font-size:9px}.remark-dot.has-content{background:var(--pink-bg);color:var(--pink-tx);border-color:var(--pink-bd)}
    .mini-item{font-size:10px;padding:4px 6px;border-radius:8px;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    table{width:100%;border-collapse:collapse}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px}
    th,td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;text-align:left;vertical-align:top} thead th{background:var(--surface-3);color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
    tr:last-child td{border-bottom:none}
    .settings-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.settings-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .row-item{display:flex;gap:8px;align-items:center;justify-content:space-between;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:10px 12px}.empty{padding:20px;text-align:center;color:var(--text-3)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(28,28,43,.45);display:grid;place-items:center;padding:18px;z-index:60}.modal-card{width:min(900px,100%);background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-lg)}
    .modal-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modal-body{padding:18px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2);font-weight:700;margin-bottom:5px}
    .hint{font-size:11px;color:var(--text-2);margin-top:4px}
    .swatch{width:100%;height:38px;padding:3px;border:1px solid var(--border-2);border-radius:10px;background:var(--surface-2);cursor:pointer}
    .swatch::-webkit-color-swatch-wrapper{padding:0}.swatch::-webkit-color-swatch{border:none;border-radius:7px}.swatch::-moz-color-swatch{border:none;border-radius:7px}
    .stu-list{display:flex;flex-direction:column;gap:7px}
    .stu-row{display:grid;grid-template-columns:24px 1fr;gap:8px;align-items:start}
    .stu-num{font-size:12px;font-weight:700;color:var(--text-3);text-align:center;padding-top:10px}
    .stu-fields{display:flex;gap:8px;min-width:0}
    .stu-fields > .ssel{flex:1.25 1 0;min-width:0}
    .stu-remark{flex:1 1 0;min-width:0;font-size:13px}
    .stu-x{padding:8px 0;font-size:17px;line-height:1;color:var(--text-2)}
    .stu-x:hover{color:var(--red-tx);border-color:var(--red-bd)}
    .ssel{position:relative;min-width:0}
    .ssel-control{display:flex;align-items:center;gap:4px;width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:11px;padding:0 6px 0 11px}
    .ssel-control.has{background:#fff;border-color:#CFCFDE}
    .ssel-control:focus-within{border-color:var(--primary);background:#fff}
    .ssel-input{flex:1;min-width:0;border:none;background:transparent;outline:none;padding:9px 0;font-size:13px;font-weight:600;color:var(--text)}
    .ssel-input::placeholder{color:var(--text-3);font-weight:600}
    .ssel-caret{font-size:10px;color:var(--text-3);cursor:pointer;padding:4px 4px;flex-shrink:0}
    .ssel-x{font-size:16px;line-height:1;color:var(--text-3);cursor:pointer;padding:0 4px;flex-shrink:0}
    .ssel-x:hover{color:var(--red-tx)}
    .ssel-btn{display:flex;align-items:center;justify-content:space-between;gap:6px;width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:11px;padding:9px 11px;cursor:pointer;text-align:left;color:var(--text-3)}
    .ssel-btn.has{color:var(--text);background:#fff;border-color:#CFCFDE}
    .ssel-btn:hover{border-color:#CFCFDE}
    .ssel-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;font-size:13px}
    .ssel-caret{font-size:10px;color:var(--text-3);flex-shrink:0}
    .ssel-x{font-size:16px;line-height:1;color:var(--text-3);padding:0 2px;flex-shrink:0}
    .ssel-x:hover{color:var(--red-tx)}
    .ssel-warn{font-size:10.5px;color:var(--amber-tx);margin-top:3px;font-weight:600}
    .ssel-backdrop{position:fixed;inset:0;z-index:61}
    .ssel-pop{position:absolute;left:0;right:0;top:calc(100% + 5px);z-index:62;background:var(--surface);border:1px solid var(--border-2);border-radius:12px;box-shadow:var(--shadow-lg);padding:7px}
    .ssel-search{margin-bottom:6px}
    .ssel-list{max-height:220px;overflow:auto;display:flex;flex-direction:column;gap:2px}
    .ssel-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:transparent;border:none;border-radius:8px;padding:8px 9px;cursor:pointer;color:var(--text);font-weight:600;font-size:13px}
    .ssel-item:hover{background:var(--primary-soft);color:var(--primary-on-soft)}
    .ssel-item-meta{font-size:11px;color:var(--text-3);font-weight:500;white-space:nowrap}
    .ssel-item-main{display:inline-flex;align-items:center;gap:6px;min-width:0;flex:1}
    .ssel-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ssel-item-pending{background:linear-gradient(90deg,rgba(245,158,11,.08),transparent 40%)}
    .ssel-item-pending:hover{background:linear-gradient(90deg,rgba(245,158,11,.18),var(--primary-soft) 60%)}
    .ssel-item-trial{background:linear-gradient(90deg,rgba(239,68,68,.06),transparent 40%)}
    .ssel-item-trial:hover{background:linear-gradient(90deg,rgba(239,68,68,.14),var(--primary-soft) 60%)}
    .ssel-flag{display:inline-flex;align-items:center;height:18px;padding:0 6px;font-size:9px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;border-radius:5px;flex-shrink:0;border:1px solid}
    .ssel-flag-r{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
    .ssel-flag-trial{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A5}
    .ssel-empty{padding:12px;text-align:center;color:var(--text-3);font-size:12px}
    .type-picks{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
    .enroll-list{display:flex;flex-direction:column;gap:8px}
    .enroll-card{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--border-2);border-left:4px solid var(--border-2);border-radius:12px;padding:11px 14px}
    .enroll-card.dim{opacity:.72}
    .enroll-main{min-width:0}
    .enroll-type{font-weight:800;font-size:13.5px}
    .enroll-when{font-weight:600;font-size:13px;color:var(--text);margin:1px 0}
    .enroll-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;text-align:right}
    .enroll-create{display:flex;flex-wrap:wrap;gap:8px}
    .reorder{display:flex;flex-direction:column;gap:2px}
    .reorder-btn{width:22px;height:18px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--border-2);border-radius:6px;color:var(--text-2);font-size:11px;line-height:1;cursor:pointer;padding:0}
    .reorder-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
    .reorder-btn:disabled{opacity:.35;cursor:not-allowed}
    .grip{cursor:grab;color:var(--text-3);font-size:15px;line-height:1;padding:2px 4px;border-radius:6px;user-select:none;letter-spacing:-1px}
    .grip:hover{color:var(--primary);background:var(--primary-soft)}
    .grip:active{cursor:grabbing}
    .lesson-row{border-radius:12px;transition:box-shadow .12s ease,transform .12s ease}
    .lt-dragging{opacity:.5}
    .lt-drop{box-shadow:0 0 0 2px var(--primary) inset;border-radius:12px}
    .lt-packages{margin:8px 0 4px 8px;padding:14px;background:var(--surface-2);border:1px solid var(--border-2);border-left:3px solid var(--primary);border-radius:12px}
    .lt-packages-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .lt-packages-list{display:flex;flex-direction:column;gap:6px}
    .lt-packages-add{margin-top:14px;padding-top:12px;border-top:1px dashed var(--border-2)}

    /* ── Lesson Type row — legible, scannable, prominent name chip ─────── */
    .lt-row-card{background:var(--surface);border:1px solid var(--border-2);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow);transition:opacity .15s ease,box-shadow .15s ease,border-color .15s ease}
    .lt-row-card:hover{border-color:#D4D4E6;box-shadow:0 6px 22px rgba(30,27,75,0.09)}
    .lt-row-hidden{opacity:.55}
    .lt-row-top{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .lt-row-lead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0;flex:1}
    .lt-name-chip{font-size:15px;font-weight:800;padding:7px 14px;border-radius:10px;border-width:2px;border-style:solid;letter-spacing:-.1px;white-space:nowrap;line-height:1.15}
    .lt-classes-pill{font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-2);white-space:nowrap}
    .lt-row-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
    .lt-row-meta{display:flex;gap:20px;flex-wrap:wrap;padding-left:4px}
    .lt-meta-tile{display:flex;flex-direction:column;gap:2px}
    .lt-meta-label{font-size:9px;text-transform:uppercase;letter-spacing:.85px;font-weight:800;color:var(--text-3);line-height:1}
    .lt-meta-value{font-size:13px;font-weight:700;color:var(--text);line-height:1.15}
    .lt-meta-empty{color:var(--text-3);font-weight:500}

    /* Packages button — soft brand presence with an inline count badge */
    .btn-packages{background:var(--primary-soft);color:var(--primary-on-soft);border:1px solid transparent;display:inline-flex;align-items:center;gap:7px;padding:6px 8px 6px 12px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;line-height:1.4;transition:background .15s ease,color .15s ease}
    .btn-packages:hover{background:#E0DAFF}
    .btn-packages.active{background:var(--primary);color:#fff}
    .pkg-count-badge{background:#fff;color:var(--primary-on-soft);font-size:11px;padding:1px 7px;border-radius:999px;font-weight:800;min-width:18px;text-align:center;border:1px solid var(--border-2)}
    .btn-packages.active .pkg-count-badge{background:rgba(255,255,255,0.22);color:#fff;border-color:transparent}
    .btn.btn-active{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* ── Missing-instructor warning (FK orphan after instructor delete) ──
       Greyed-out name, amber ⚠ triangle inline, "Needs instructor" pill,
       and a corner ⚠ on the card itself for at-a-glance spotting. */
    .wa-card{position:relative}
    .daily-event{position:relative}
    .wa-card-warn{box-shadow:0 0 0 1.5px var(--amber-bd) inset}
    .daily-event-warn{box-shadow:0 0 0 1.5px var(--amber-bd) inset}
    .card-warn-corner{position:absolute;top:6px;right:8px;font-size:14px;color:var(--amber-tx);filter:drop-shadow(0 1px 1px rgba(0,0,0,0.15));pointer-events:none;line-height:1;z-index:1}
    .inst-missing{display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
    .inst-orphan{color:var(--text-3) !important;font-style:italic;text-decoration:line-through;text-decoration-color:rgba(180,83,9,.45)}
    .warn-tri{color:var(--amber-tx);font-size:12px;line-height:1;flex-shrink:0}
    .inst-warn-chip{display:inline-flex;align-items:center;background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd);font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:6px;line-height:1.3;white-space:nowrap}

    /* ── Instructor row: gender chip + add-form layout + editor ────────── */
    .inst-add{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
    .inst-add .input{flex:1;min-width:160px}
    .gender-toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;padding:2px;gap:2px}
    .gender-opt{appearance:none;background:transparent;border:none;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:700;color:var(--text-2);cursor:pointer;line-height:1;transition:background .15s,color .15s}
    .gender-opt:hover{background:var(--surface)}
    .gender-opt.active{background:#fff;color:var(--primary-on-soft);box-shadow:0 1px 3px rgba(30,27,75,0.1)}
    .gender-toggle-sm .gender-opt{padding:6px 8px;font-size:11px}
    .gender-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;line-height:1.3;white-space:nowrap}
    .gender-chip-female{background:var(--pink-bg);color:var(--pink-tx);border:1px solid var(--pink-bd)}
    .gender-chip-male{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD}
    .gender-chip-unset{background:var(--surface-2);color:var(--text-3);border:1px solid var(--border-2);font-weight:500}
    .inst-editor{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;padding:10px}

    /* ── Class type badge on lesson type rows ────────────────────────────── */
    .lt-type-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap}
    .lt-type-group{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
    .lt-type-personal{background:#FDF4FF;color:#7E22CE;border:1px solid #E9D5FF}

    /* ── Group replacement section in modal ─────────────────────────────── */
    .repl-section{margin-top:14px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;display:flex;flex-direction:column;gap:8px}
    .repl-section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .repl-section-title{font-size:13px;font-weight:800;color:var(--text)}
    .repl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .repl-badge-sm{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd);font-size:10px;font-weight:900;flex-shrink:0}
    /* →R button on regular student slots — quietly amber, hover lifts to clear amber */
    .repl-mark-btn{display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 10px;font-size:11px;font-weight:800;letter-spacing:.4px;background:transparent;color:var(--amber-tx);border:1px solid var(--amber-bd);border-radius:8px;cursor:pointer;white-space:nowrap;align-self:center;flex:0 0 auto;transition:background .15s, transform .15s}
    .repl-mark-btn:hover{background:var(--amber-bg);transform:translateY(-1px)}
    /* Quick-pick candidate row above the manual selector */
    .repl-quickpick{padding:10px 12px;background:#fff;border:1px dashed var(--border-2);border-radius:10px}
    .quickpick-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:#fff;border:1px solid var(--border-2);border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:background .15s, border-color .15s, transform .15s}
    .quickpick-chip:hover{transform:translateY(-1px);border-color:var(--primary)}
    .quickpick-rpending:hover{background:#FEF3C7;border-color:#FCD34D}
    .quickpick-trial:hover{background:#FEE2E2;border-color:#FCA5A5}
    .qp-meta{font-size:10px;color:var(--text-3);font-weight:500}
    /* Floating row tag on selected replacement-row swimmer */
    .qp-tag{display:inline-flex;align-items:center;height:16px;padding:0 6px;font-size:9px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;border-radius:5px;border:1px solid;box-shadow:0 1px 2px rgba(0,0,0,.06)}
    .qp-tag-r{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
    .qp-tag-trial{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A5}
    /* Replacement marker inline in cards */
    .wa-stu-repl{background:rgba(180,83,9,0.08) !important;border-color:var(--amber-bd) !important}
    .repl-mark{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:var(--amber-bg);color:var(--amber-tx);font-size:9px;font-weight:900;margin-right:3px;flex-shrink:0}
    .repl-mark-sm{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:var(--amber-bg);color:var(--amber-tx);font-size:8px;font-weight:900;margin-right:3px;vertical-align:middle}
    .daily-stu-repl{background:rgba(251,191,36,0.12);border-color:var(--amber-bd)}

    /* ── Personal class reschedule UI ───────────────────────────────────── */
    .reschedule-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .reschedule-notice{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 10px;background:var(--primary-soft);border:1px solid #D9D4F0;border-radius:8px}
    .reschedule-from-badge{font-size:12px;font-weight:700;color:var(--primary-on-soft)}
    .reschedule-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;padding:10px 0 4px;border-top:1px dashed var(--border-2);margin-top:4px}
    .swimmer-add-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}

    /* ── Swimmer list sort tabs ─────────────────────────────────────────── */
    .sort-tabs{display:inline-flex;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;padding:2px;gap:2px}
    .sort-tab{appearance:none;background:transparent;border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;color:var(--text-2);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
    .sort-tab:hover{background:var(--surface)}
    .sort-tab.active{background:#fff;color:var(--primary-on-soft);box-shadow:0 1px 3px rgba(30,27,75,.09)}

    /* ── Family group header row & indented members ─────────────────────── */
    .swimmer-group-header td{background:var(--surface-2);padding:6px 10px !important;border-bottom:1px solid var(--border-2)}
    .group-header-label{font-size:11px;font-weight:800;color:var(--text-2);letter-spacing:.3px;text-transform:uppercase}
    .swimmer-in-group td:first-child{padding-left:22px !important}

    /* ── Credits cell in swimmer list ───────────────────────────────────── */
    .credit-cell{display:flex;flex-direction:column;gap:1px}
    .credit-cell-num{font-size:15px;font-weight:800;color:var(--text);line-height:1.1}
    .credit-cell-num.credit-low{color:var(--red-tx)}
    .credit-cell-sub{font-size:10px;color:var(--text-3);line-height:1.2}

    /* ── Student registration form sections ─────────────────────────────── */
    .student-form-section{margin-top:14px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;display:flex;flex-direction:column;gap:10px}
    .student-form-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);margin-bottom:2px}
    .tc-status-row{font-size:12px;font-weight:700;padding:8px 12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .tc-status-row.tc-accepted{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
    .tc-status-row.tc-pending{background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}
    .tc-badge-ok{font-size:11px;font-weight:700;color:var(--green-tx);white-space:nowrap;cursor:default}
    .tc-badge-pending{font-size:11px;font-weight:700;color:var(--amber-tx);white-space:nowrap}

    /* ── T&C page ────────────────────────────────────────────────────────── */
    .tc-student-summary{display:flex;flex-direction:column;gap:4px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;font-size:12px}
    .tc-warn{color:var(--red-tx);font-weight:700}
    .tc-doc-scroll{max-height:480px;overflow-y:auto;padding:16px 18px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;position:relative}
    .tc-h1{font-size:18px;font-weight:800;color:var(--text);margin:0 0 4px}
    .tc-h2{font-size:14px;font-weight:700;color:var(--text-2);margin:0 0 18px;padding-bottom:10px;border-bottom:1px solid var(--border-2)}
    .tc-section{margin-bottom:18px}
    .tc-h3{font-size:13px;font-weight:800;color:var(--text);margin:0 0 6px}
    .tc-para{font-size:12px;line-height:1.7;color:var(--text-2);margin:0 0 8px;white-space:pre-line}
    .tc-scroll-hint{position:sticky;bottom:0;text-align:center;font-size:11px;color:var(--text-3);background:linear-gradient(transparent,var(--surface-2) 60%);padding:12px 0 4px;font-weight:700;pointer-events:none}
    .tc-success{background:var(--green-bg);border-color:var(--green-bd)}
    .tc-success .small{color:var(--green-tx)}

    /* ── Lessons rows (register + edit) ──────────────────────────────────── */
    .lessons-rows{display:flex;flex-direction:column;gap:8px}
    .lesson-row{display:grid;grid-template-columns:1.4fr 1.6fr 36px;gap:8px;align-items:center}
    .lesson-row-x{width:36px;height:36px;padding:0;font-size:18px;line-height:1;background:transparent;border:1px solid var(--border-2);border-radius:8px;color:var(--text-3);cursor:pointer;transition:.15s ease}
    .lesson-row-x:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx)}
    .lesson-row-x-spacer{width:36px;height:36px}
    .lesson-add-btn{align-self:flex-start;margin-top:4px;font-weight:700}
    .lesson-add-btn:hover{background:var(--primary-soft);color:var(--primary-on-soft);border-color:var(--primary)}
    @media (max-width:768px){.lesson-row{grid-template-columns:1fr 1fr 36px}}
    .reschedule-tag{font-size:11px;font-weight:800;color:var(--primary-on-soft);background:var(--primary-soft);border:1px solid #D9D4F0;padding:1px 5px;border-radius:5px;margin-left:5px;cursor:default}

    /* ── Credit balance UI ──────────────────────────────────────────────── */
    .credit-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-2)}
    .credit-row:last-child{border-bottom:none}
    .credit-row-name{font-size:13px;font-weight:700;color:var(--text);min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .credit-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .credit-count{font-size:13px;font-weight:800;color:var(--text)}
    .credit-count.credit-low{color:var(--red-tx)}
    .credit-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
    .credit-btn:hover{background:var(--surface-2)}
    .credit-init{display:flex;align-items:center;gap:6px;flex-shrink:0}
    /* Inline credit marker on session cards */
    .credit-mark{font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.1px}
    .credit-mark.credit-low{color:var(--red-tx)}
    /* Trial annotation — drawn from the swimmer's package (any package whose
       name contains "trial"). Pill in the modal slot, subtle mark in cards. */
    .trial-pill{display:inline-flex;align-items:center;height:36px;padding:0 10px;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;border-radius:8px;white-space:nowrap;align-self:center;flex:0 0 auto}
    .trial-mark{font-size:11px;font-weight:700;color:#B91C1C;letter-spacing:.2px}
    .wa-stu .trial-mark{font-size:10px}
    .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;padding:3px;gap:3px}
    .seg-btn{border:none;background:transparent;color:var(--text-2);font-weight:700;font-size:12px;padding:7px 14px;border-radius:7px;cursor:pointer}
    .seg-btn.on{background:var(--primary);color:#fff}
    .suffix-input{position:relative;display:inline-flex;align-items:center}
    .suffix-input .input{width:140px;padding-right:70px}
    .suffix-tag{position:absolute;right:11px;color:var(--text-3);font-size:12px;font-weight:600;pointer-events:none}
    .gb-check{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer}
    .gb-check input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
    .gb-card{border:1px solid var(--border-2);border-radius:14px;padding:14px;background:var(--surface-2)}
    .gb-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .gb-status{margin-top:10px;padding:8px 12px;border-radius:10px;font-size:12.5px;font-weight:700;border:1px solid transparent}
    .gb-ok{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd)}
    .gb-warn{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd)}
    .gb-amber{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd)}
    .gb-dim{background:#F0F0F5;color:var(--text-2);border-color:var(--border-2)}
    .gb-edit{margin-top:10px;padding:10px;border:1px dashed var(--border-2);border-radius:10px;background:var(--surface)}
    .gb-members{margin-top:10px;display:flex;flex-direction:column;gap:4px}
    .gb-member{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;font-size:13px}
    .gb-noclass{color:var(--amber-tx);font-size:11px;font-weight:600}
    .gb-add{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
    .student-box{border:1px solid var(--border);background:var(--surface-2);border-radius:12px;padding:10px;margin-top:10px}
    .student-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}.student-row:last-child{border-bottom:none}
    .daily-day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .daily-day-tab{padding:7px 14px;border-radius:999px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);cursor:pointer;font-weight:600;font-size:12px}
    .daily-day-tab:hover{border-color:#CFCFDE;color:var(--text)}
    .daily-day-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(109,91,208,0.25)}
    .daily-grid{border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .daily-row{display:grid;grid-template-columns:140px 1fr;min-height:72px;border-bottom:1px solid var(--border)}
    .daily-row:last-child{border-bottom:none}
    .daily-time{padding:12px 16px;background:var(--surface-3);color:var(--text-2);font-size:18px;font-weight:800;border-right:1px solid var(--border);white-space:nowrap}
    .daily-slot{padding:10px 12px;background:var(--surface)}
    .daily-slot.empty{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .daily-sessions{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px;align-items:start}
    .daily-event{border:1px solid rgba(0,0,0,0.06);border-left:6px solid var(--primary);border-radius:11px;padding:11px 13px;background:var(--surface-2);cursor:pointer;transition:transform .08s ease, box-shadow .12s ease}
