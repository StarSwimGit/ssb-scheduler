<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSB Scheduler</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#E9E9F1;--surface:#fff;--surface-2:#F4F4FA;--surface-3:#FAFAFB;
      --border:#ECECF3;--border-2:#E1E1EC;
      --text:#1C1C2B;--text-2:#6C6C7E;--text-3:#9C9CAD;
      --primary:#6D5BD0;--primary-press:#5C49C0;--primary-soft:#EEEBFF;--primary-on-soft:#5B49BE;
      --teal:#1FA98F;
      --green-bg:#E4F6EC;--green-tx:#138A53;--green-bd:#BFE8CF;
      --amber-bg:#FCEFD6;--amber-tx:#B45309;--amber-bd:#F2DCA8;
      --red-bg:#FCE7E7;--red-tx:#D63B3B;--red-bd:#F3C9C9;
      --pink-bg:#FCE7F0;--pink-tx:#DB2777;--pink-bd:#F5C9DD;
      --shadow:0 4px 18px rgba(30,27,75,0.06);--shadow-lg:0 12px 34px rgba(30,27,75,0.10);
    }
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit;color:inherit}
    .header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px}
    .header-inner{max-width:1500px;min-height:54px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:6px 0;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:34px;height:34px;border-radius:50%;object-fit:contain;display:block;flex-shrink:0;box-shadow:0 4px 12px rgba(28,156,224,.28)}
    /* Stats + status as a two-line stack: line 1 is the week summary,
       line 2 is the live connection/save status with a colored dot. Pushed
       into the middle of the header; it grows to absorb spare space so the
       tab groups always sit flush to the right. */
    .header-meta{display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex:1;min-width:200px;line-height:1.3}
    .header-summary{font-size:11px;color:var(--text-3)}
    .header-status{font-size:10px;color:var(--text-3);display:inline-flex;align-items:center;gap:6px;font-weight:600}
    .status-dot{display:inline-block;width:7px;height:7px;border-radius:999px;background:var(--text-3);flex-shrink:0}
    .status-dot.is-ok{background:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,.18)}
    .status-dot.is-loading{background:#F59E0B;animation:pulse-dot 1.2s ease-in-out infinite}
    .status-dot.is-error{background:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.18)}
    @keyframes pulse-dot{0%,100%{opacity:.5;transform:scale(.85)}50%{opacity:1;transform:scale(1.05)}}
    /* Two tab groups side by side — left holds primary navigation + the
       Intake outbound link; right holds Summary and Settings, mirroring
       the convention of putting admin/utility tools apart from main views.
       Slightly tighter than v1 — smaller font, less padding, less radius. */
    .header-tabs{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
    .tabs{display:flex;gap:3px;background:var(--surface-2);border-radius:11px;padding:4px;border:1px solid var(--border);flex-wrap:wrap}
    .tab{padding:6px 13px;border:none;border-radius:8px;background:transparent;color:var(--text-2);font-weight:600;font-size:13px;cursor:pointer;letter-spacing:.1px}
    .tab:hover{color:var(--text)}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 7px rgba(109,91,208,0.29)}
    /* Outbound tab (Intake) reads as a link rather than a navigation tab —
       no active state since it doesn't change the SPA's view, and a faint
       dashed border so it visually breaks from the in-app tabs to its left. */
    .tab.tab-link{color:var(--primary-on-soft);font-weight:700;border:1px dashed var(--primary);background:rgba(109,91,208,.06)}
    .tab.tab-link:hover{background:var(--primary-soft);border-style:solid}
    .wrap{max-width:1500px;margin:0 auto;padding:22px 22px 40px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
    .small{font-size:12px}.muted{color:var(--text-2)}.subtle{color:var(--text-2)}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--border-2);background:var(--surface-2);color:var(--text-2)}
    .btn.small-btn{padding:4px 9px;font-size:11px}
    .btn{border:none;border-radius:11px;padding:9px 14px;cursor:pointer;font-weight:600}.btn[disabled]{opacity:.45;cursor:not-allowed}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(109,91,208,0.28)}.btn-primary:hover:not([disabled]){background:var(--primary-press)}
    .btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border-2)}.btn-ghost:hover{border-color:#CFCFDE}
    .btn-danger{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
    .btn-print{background:var(--surface);color:var(--text);border:1px solid var(--border-2)}.btn-print:hover{border-color:#CFCFDE}
    .input,.select,.textarea{width:100%;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);border-radius:11px;padding:10px 12px;outline:none}
    .input:focus,.select:focus,.textarea:focus{border-color:var(--primary);background:#fff}
    .textarea{min-height:86px;resize:vertical}
    .week-day-link{display:block;width:100%;background:transparent;border:none;color:var(--text);font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:2px 0 4px;cursor:pointer}
    .week-day-link:hover{color:var(--primary)}
    .week-clear-btn{display:block;width:100%;background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red-tx);border-radius:8px;padding:5px 4px;font-size:10px;font-weight:700;cursor:pointer}
    .week-clear-placeholder{display:block;width:100%;border:1px solid var(--border);color:var(--text-3);border-radius:8px;padding:5px 4px;font-size:10px;font-weight:600}
    .week-scroll{overflow-x:auto;overflow-y:hidden;background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
    .week-canvas{width:100%}
    .week-head-row{display:flex;border-bottom:1px solid var(--border)}
    .week-corner{width:96px;flex:0 0 96px;position:sticky;left:0;z-index:7;background:var(--surface)}
    .week-day-head{padding:6px 4px 7px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;justify-content:flex-start}
    .week-day-head:last-child{border-right:none}
    .week-body-row{display:flex}
    .time-col{width:96px;flex:0 0 96px;border-right:1px solid var(--border);background:var(--surface-3);position:sticky;left:0;z-index:6}
    .time-cell{height:42px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:12px;padding-top:3px;font-size:18px}
    .time-cell.major{border-bottom:1px solid var(--border-2);color:var(--text-2);font-weight:700}
    .time-cell.minor{border-bottom:1px solid var(--border);color:var(--text-3)}
    .day-col{position:relative;border-right:1px solid var(--border)}.day-col:last-child{border-right:none}
    .slot-cell{height:42px;cursor:pointer}
    .slot-cell.major{border-bottom:1px solid var(--border-2);background:transparent}
    .slot-cell.minor{border-bottom:1px solid var(--border);background:transparent}
    .slot-cell:hover{background:var(--primary-soft)!important}
    .pool-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .pool-tab{padding:7px 14px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);font-weight:600;border-radius:999px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:6px}
    .pool-tab:hover{border-color:#CFCFDE;color:var(--text)}
    .pool-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(109,91,208,0.25)}
    .pool-tab-cap{font-size:10px;opacity:.8;font-weight:600}
    .event-pool-pill{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.3px;padding:1px 5px;border-radius:5px;background:var(--primary-soft);color:var(--primary-on-soft);margin-right:4px;vertical-align:baseline;text-transform:uppercase}
    .view-head{margin-bottom:14px}
    .view-title{font-size:19px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
    .period-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .period-nav-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .period-stepper{display:inline-flex;align-items:stretch;background:var(--surface);border:1px solid var(--border-2);border-radius:12px;overflow:hidden}
    .step-btn{background:transparent;border:none;color:var(--text-2);font-size:20px;font-weight:700;line-height:1;padding:0 15px;cursor:pointer;display:flex;align-items:center}
    .step-btn:hover{background:var(--primary-soft);color:var(--primary-on-soft)}
    .period-label{display:flex;align-items:center;justify-content:center;padding:9px 18px;font-weight:700;font-size:13px;color:var(--text);border-left:1px solid var(--border-2);border-right:1px solid var(--border-2);white-space:nowrap;min-width:182px;letter-spacing:.2px}
    .today-btn{background:var(--surface);border:1px solid var(--border-2);color:var(--text-2);border-radius:12px;padding:9px 15px;font-weight:600;font-size:12px;cursor:pointer}
    .today-btn:hover:not(:disabled){border-color:#CFCFDE;color:var(--text)}
    .today-btn.is-current,.today-btn:disabled{opacity:.45;cursor:default}
    .period-nav-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .nav-note{font-size:12px;color:var(--text-2);margin-bottom:12px}
    .print-wrap{position:relative;display:inline-block}
    .caret{font-size:10px;opacity:.7;margin-left:2px}
    .menu-backdrop{position:fixed;inset:0;z-index:40}
    .drop-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:41;background:var(--surface);border:1px solid var(--border-2);border-radius:13px;padding:5px;min-width:212px;box-shadow:var(--shadow-lg)}
    .drop-item{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;background:transparent;border:none;color:var(--text);padding:9px 11px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px}
    .drop-item:hover{background:var(--primary-soft);color:var(--primary-on-soft)}
    .drop-hint{font-size:11px;font-weight:500;color:var(--text-3)}
    .wagenda{display:grid;grid-template-columns:62px repeat(7,minmax(0,1fr));background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
    .wa-corner{background:var(--surface-3);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
    .wa-dayhead{background:var(--surface);border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:7px 5px 8px;display:flex;flex-direction:column;gap:5px;text-align:center}
    .wa-time{background:var(--surface-3);border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text-2);font-weight:600;font-size:12.5px;letter-spacing:.2px;white-space:nowrap;display:flex;align-items:flex-start;justify-content:flex-end;padding:8px 9px 0 4px}
    .wa-cell{border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:6px;display:flex;flex-direction:column;gap:5px;min-height:48px;cursor:pointer}
    .wa-cell:hover{background:var(--primary-soft)}
    .wa-card{border-radius:11px;padding:7px 9px;cursor:pointer;box-shadow:0 1px 3px rgba(30,27,75,0.07)}
    /* Drag-to-reorder — card is draggable when multiple sessions share the slot */
    .wa-card[draggable="true"]{cursor:grab;user-select:none}
    .wa-card[draggable="true"]:active{cursor:grabbing}
    .wa-card.wa-card-dragging{opacity:0.35;box-shadow:none;transform:scale(.97)}
    .wa-card.wa-card-dragover{outline:2px solid var(--primary);outline-offset:-2px;box-shadow:0 0 0 4px rgba(109,91,208,.15)}
    /* Highlight pulse — shown when a session is jumped to from the Accounts panel */
    @keyframes session-pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(109,91,208,0),0 1px 3px rgba(30,27,75,.07)}
      40%{box-shadow:0 0 0 7px rgba(109,91,208,.28),0 1px 3px rgba(30,27,75,.07)}
    }
    .wa-card.wa-card-highlight{animation:session-pulse 1.1s ease-in-out infinite;outline:2px solid var(--primary);outline-offset:1px;z-index:5;position:relative}
    .wa-card.event-over{box-shadow:0 0 0 1.5px rgba(214,59,59,0.5) inset}
    /* Ghost — a cancelled (forwarded/rescheduled) session that stays in
       the original spot, dimmed, click to restore. No coloured stripe,
       no fill — just a dashed grey outline so it reads as "absent". */
    .wa-card.wa-card-cancelled{background:repeating-linear-gradient(135deg,#F5F5F7,#F5F5F7 6px,#EDEDF0 6px,#EDEDF0 12px) !important;border:1px dashed #B8BCC8 !important;border-left:1px dashed #B8BCC8 !important;color:#6B7080 !important;opacity:.78;transition:.15s ease}
    .wa-card.wa-card-cancelled:hover{opacity:1;border-color:#9098AC !important;background:repeating-linear-gradient(135deg,#FAFAFB,#FAFAFB 6px,#F2F2F5 6px,#F2F2F5 12px) !important}
    .wa-card-title-strike{text-decoration:line-through;color:#6B7080}
    .wa-card-strike{text-decoration:line-through;color:#7A8094}
    .wa-cancelled-tag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#7A2E2E;background:#FEF2F2;border:1px solid #FBD5D5;border-radius:4px;padding:1px 5px;white-space:nowrap}
    .wa-card-restore-hint{font-size:9.5px;color:#9098AC;margin-top:3px;font-style:italic;text-align:right}
    .wa-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
    .wa-card-title{font-size:12.5px;font-weight:800;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis}
    .wa-card-line{font-size:11px;line-height:1.35;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .wa-card-inst{font-weight:800;opacity:1}
    .wa-card-students{display:flex;flex-direction:column;gap:0;margin-top:3px}
    .wa-stu{font-size:10.5px;line-height:1.45;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wa-card-students-empty{font-size:10.5px;opacity:.6;margin-top:3px}
    .event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
    .event-head .event-title{flex:1;min-width:0}
    .cap-chip{flex-shrink:0;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;border:1px solid transparent;line-height:1.35;letter-spacing:.3px;white-space:nowrap}
    .cap-chip-lg{font-size:13px;padding:4px 10px;border-radius:999px;line-height:1.2;border-width:1px;border-style:solid}
    .cap-chip-unknown{background:var(--surface-2);color:var(--text-2);border-color:var(--border-2)}
    .event.event-over{box-shadow:0 0 0 1px rgba(214,59,59,0.4) inset, 0 2px 10px rgba(214,59,59,0.18)!important}
    .pool-badge{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary-on-soft);font-size:10px;font-weight:700;margin-left:6px;vertical-align:middle}
    .cap-preview{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:9px 11px;min-height:42px}
    .lesson-row{display:flex;flex-direction:column;gap:0}
    .lesson-edit{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:12px;margin-top:6px}
    .btn.small{padding:5px 10px;font-size:11px;border-radius:9px}
    .event{position:absolute;padding:4px 7px;overflow:hidden;cursor:pointer;z-index:4;box-sizing:border-box;border-radius:0 7px 7px 0;box-shadow:0 2px 8px rgba(30,27,75,.12)}
    .event-title{font-size:12px;font-weight:800;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.event-sub{font-size:10px;opacity:.86;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid transparent}
    .chip-toggle{cursor:pointer;user-select:none;transition:.12s ease}
    .chip-toggle.chip-off{background:var(--surface-2)!important;border-color:var(--border-2)!important;color:var(--text-3)!important;opacity:.85}
    .legend-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
    .legend-allbtn{background:var(--surface);border:1px solid var(--border-2);color:var(--text);border-radius:999px;padding:6px 13px;font-weight:600;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
    .legend-allbtn:hover{border-color:#CFCFDE}
    .legend-allbtn:disabled{opacity:.45;cursor:not-allowed}
    .legend-allbtn .dot{width:8px;height:8px;border-radius:999px;background:var(--teal)}
    .legend-allbtn.is-off .dot{background:var(--text-3)}
    /* Two-row legend variant — types on top, instructors below */
    .legend-bar-v{flex-direction:column;align-items:stretch;gap:8px}
    .legend-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .legend-row .legend{flex:1;display:flex;flex-wrap:wrap;gap:6px;min-width:0;margin:0}
    .legend-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);min-width:74px;flex-shrink:0}
    .legend-row-instructors{padding-top:8px;border-top:1px dashed var(--border-2)}
    /* Instructor chips — neutral when off, primary tint when on, with gender glyph */
    .chip-instructor{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text-3);border-radius:999px;font-weight:600;font-size:12px;cursor:pointer;transition:.12s ease;user-select:none}
    .chip-instructor:hover{border-color:var(--primary);color:var(--primary-on-soft)}
    .chip-instructor.is-on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-on-soft);box-shadow:0 1px 4px rgba(109,91,208,.18)}
    .chip-instructor .inst-chip-g{font-size:11px;opacity:.7;line-height:1}
    .chip-instructor.is-on .inst-chip-g{opacity:1;color:var(--primary)}
    .grid{display:grid;gap:16px}.grid-2{grid-template-columns:1.25fr .75fr}.grid-3{grid-template-columns:repeat(3,1fr)}
    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.month-dow{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-2);font-weight:700;padding:0 4px 2px}
    .day-box{min-height:122px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px;cursor:pointer;display:flex;flex-direction:column;gap:8px;transition:.15s ease}
    .day-box:hover{transform:translateY(-1px);border-color:#D6D6E6;box-shadow:var(--shadow)}.day-box.outside{opacity:.5}.day-box.selected{outline:2px solid rgba(109,91,208,.45);border-color:var(--primary)}
    .day-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.day-num{font-size:14px;font-weight:800}.remark-dot{font-size:11px;padding:2px 7px;border-radius:999px;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;line-height:1;min-width:58px;height:22px}.remark-dot.empty{background:#F0F0F5;color:var(--text-3);border-color:var(--border-2);height:13px;min-width:58px;padding:0 7px;font-size:9px}.remark-dot.has-content{background:var(--pink-bg);color:var(--pink-tx);border-color:var(--pink-bd)}
    .mini-item{font-size:10px;padding:4px 6px;border-radius:8px;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    table{width:100%;border-collapse:collapse}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px}
    th,td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;text-align:left;vertical-align:middle} thead th{background:var(--surface-3);color:var(--text-2);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
    tr:last-child td{border-bottom:none}
    .settings-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.settings-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .row-item{display:flex;gap:8px;align-items:center;justify-content:space-between;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:10px 12px}.empty{padding:20px;text-align:center;color:var(--text-3)}
    /* Modal — capped at viewport height with sticky head/footer so Close
       and Save are always reachable. Aggressively compact: tight paddings,
       minimal label margins, small fonts, no decorative chips/boxes
       inside the body. The body scrolls inside the card. */
    .modal-backdrop{position:fixed;inset:0;background:rgba(28,28,43,.45);display:grid;place-items:center;padding:8px;z-index:60}
    .modal-card{width:min(680px,100%);max-height:92vh;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-lg);display:flex;flex-direction:column}
    .modal-head{flex-shrink:0;padding:7px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--surface)}
    .modal-body{flex:1 1 auto;overflow-y:auto;padding:9px 11px}
    .modal-foot{flex-shrink:0;padding:7px 11px;border-top:1px solid var(--border);background:var(--surface);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
    .form-grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .field{margin:0}
    .field label{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);font-weight:700;margin-bottom:2px}
    .modal-body .input,.modal-body .select{padding:5px 9px;font-size:12px;border-radius:7px}
    .modal-body .hint{font-size:10px;color:var(--text-3);margin-top:2px;line-height:1.3}
    /* Plain inline meta strip — replaces the boxed Time/Capacity fields.
       Single line, comma-separated, no chip styling. */
    .modal-meta-strip{grid-column:1 / -1;font-size:11px;color:var(--text-2);padding:2px 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .modal-meta-strip strong{color:var(--text);font-weight:700}
    .modal-meta-strip .meta-warn{color:var(--red-tx);font-weight:700}
    .hint{font-size:11px;color:var(--text-2);margin-top:4px}
    .swatch{width:100%;height:38px;padding:3px;border:1px solid var(--border-2);border-radius:10px;background:var(--surface-2);cursor:pointer}
    .swatch::-webkit-color-swatch-wrapper{padding:0}.swatch::-webkit-color-swatch{border:none;border-radius:7px}.swatch::-moz-color-swatch{border:none;border-radius:7px}
    .stu-list{display:flex;flex-direction:column;gap:3px}
    .stu-row{display:grid;grid-template-columns:16px 1fr;gap:5px;align-items:center}
    .stu-num{font-size:10px;font-weight:700;color:var(--text-3);text-align:center;padding-top:6px}
    .stu-fields{display:flex;gap:5px;min-width:0;flex-wrap:wrap;align-items:center}
    .stu-fields > .ssel{flex:1.25 1 0;min-width:140px}
    .stu-remark{flex:1 1 0;min-width:100px;font-size:11.5px}
    /* Group chips — quick-add row below the swimmer list. Two variants:
       - Discount (👪, grey): standard family billing group, flexible.
       - Bound (🔗, amber): must-attend-together, all-or-nothing add. */
    .quick-add-groups{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:7px;padding:6px 8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px}
    .quick-add-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);white-space:nowrap}
    .group-chip{padding:4px 9px;border-radius:6px;font-size:11.5px;font-weight:700;cursor:pointer;border:1px solid var(--border-2);background:#fff;color:var(--text-2);transition:.12s ease;line-height:1.3}
    .group-chip:hover{background:var(--surface-3);border-color:var(--primary);color:var(--text)}
    .group-chip-bound{background:#FEF3C7;border-color:#FCD34D;color:#92400E}
    .group-chip-bound:hover{background:#FEF9C7;border-color:#CA8A04}
    /* Subtle package label shown next to a swimmer's name in the modal row.
       Indicates which package they're enrolled on for the current lesson type. */
    .stu-pkg-label{display:inline-block;font-size:10.5px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border-2);border-radius:4px;padding:1px 6px;white-space:nowrap;line-height:1.4;flex-shrink:0}
    .stu-x{padding:0;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1;color:var(--text-2);cursor:pointer;flex-shrink:0;border:none;background:transparent}
    .stu-x:hover{color:var(--red-tx)}
    .ssel{position:relative;min-width:0}
    .ssel-control{display:flex;align-items:center;gap:4px;width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;padding:0 5px 0 9px}
    .ssel-control.has{background:#fff;border-color:#CFCFDE}
    .ssel-control:focus-within{border-color:var(--primary);background:#fff}
    .ssel-input{flex:1;min-width:0;border:none;background:transparent;outline:none;padding:6px 0;font-size:12px;font-weight:600;color:var(--text)}
    .ssel-input::placeholder{color:var(--text-3);font-weight:600}
    .ssel-caret{font-size:10px;color:var(--text-3);cursor:pointer;padding:4px 4px;flex-shrink:0}
    .ssel-x{font-size:16px;line-height:1;color:var(--text-3);cursor:pointer;padding:0 4px;flex-shrink:0}
    .ssel-x:hover{color:var(--red-tx)}
    .ssel-btn{display:flex;align-items:center;justify-content:space-between;gap:6px;width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:11px;padding:9px 11px;cursor:pointer;text-align:left;color:var(--text-3)}
    .ssel-btn.has{color:var(--text);background:#fff;border-color:#CFCFDE}
    .ssel-btn:hover{border-color:#CFCFDE}
    .ssel-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;font-size:13px}
    .ssel-caret{font-size:10px;color:var(--text-3);flex-shrink:0}
    .ssel-x{font-size:16px;line-height:1;color:var(--text-3);padding:0 2px;flex-shrink:0}
    .ssel-x:hover{color:var(--red-tx)}
    .ssel-warn{font-size:10.5px;color:var(--amber-tx);margin-top:3px;font-weight:600}
    .ssel-backdrop{position:fixed;inset:0;z-index:71}
    .ssel-pop{position:absolute;left:0;right:0;top:calc(100% + 5px);z-index:72;background:var(--surface);border:1px solid var(--border-2);border-radius:12px;box-shadow:var(--shadow-lg);padding:7px}
    /* Portalled popup — uses fixed positioning anchored to the trigger's
       bounding rect. Floats above the modal backdrop so it never gets
       clipped by the scrollable modal-body. */
    .ssel-pop-portal{position:fixed !important;right:auto !important;top:auto;z-index:72;max-width:calc(100vw - 16px)}
    .ssel-search{margin-bottom:6px}
    .ssel-list{max-height:220px;overflow:auto;display:flex;flex-direction:column;gap:2px}
    .ssel-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:transparent;border:none;border-radius:8px;padding:8px 9px;cursor:pointer;color:var(--text);font-weight:600;font-size:13px}
    .ssel-item:hover{background:var(--primary-soft);color:var(--primary-on-soft)}
    .ssel-item-meta{font-size:11px;color:var(--text-3);font-weight:500;white-space:nowrap}
    .ssel-item-main{display:inline-flex;align-items:center;gap:6px;min-width:0;flex:1}
    .ssel-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ssel-item-pending{background:linear-gradient(90deg,rgba(245,158,11,.08),transparent 40%)}
    .ssel-item-pending:hover{background:linear-gradient(90deg,rgba(245,158,11,.18),var(--primary-soft) 60%)}
    .ssel-item-trial{background:linear-gradient(90deg,rgba(239,68,68,.06),transparent 40%)}
    .ssel-item-trial:hover{background:linear-gradient(90deg,rgba(239,68,68,.14),var(--primary-soft) 60%)}
    .ssel-flag{display:inline-flex;align-items:center;height:18px;padding:0 6px;font-size:9px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;border-radius:5px;flex-shrink:0;border:1px solid}
    .ssel-flag-r{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
    .ssel-flag-trial{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A5}
    .ssel-empty{padding:12px;text-align:center;color:var(--text-3);font-size:12px}
    .type-picks{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
    .enroll-list{display:flex;flex-direction:column;gap:8px}
    .enroll-card{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--border-2);border-left:4px solid var(--border-2);border-radius:12px;padding:11px 14px}
    .enroll-card.dim{opacity:.72}
    .enroll-main{min-width:0}
    .enroll-type{font-weight:800;font-size:13.5px}
    .enroll-when{font-weight:600;font-size:13px;color:var(--text);margin:1px 0}
    .enroll-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;text-align:right}
    .enroll-create{display:flex;flex-wrap:wrap;gap:8px}
    .reorder{display:flex;flex-direction:column;gap:2px}
    .reorder-btn{width:22px;height:18px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--border-2);border-radius:6px;color:var(--text-2);font-size:11px;line-height:1;cursor:pointer;padding:0}
    .reorder-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
    .reorder-btn:disabled{opacity:.35;cursor:not-allowed}
    .grip{cursor:grab;color:var(--text-3);font-size:15px;line-height:1;padding:2px 4px;border-radius:6px;user-select:none;letter-spacing:-1px}
    .grip:hover{color:var(--primary);background:var(--primary-soft)}
    .grip:active{cursor:grabbing}
    .lesson-row{border-radius:12px;transition:box-shadow .12s ease,transform .12s ease}
    .lt-dragging{opacity:.5}
    .lt-drop{box-shadow:0 0 0 2px var(--primary) inset;border-radius:12px}
    .lt-packages{margin:8px 0 4px 8px;padding:14px;background:var(--surface-2);border:1px solid var(--border-2);border-left:3px solid var(--primary);border-radius:12px}
    .lt-packages-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .lt-packages-list{display:flex;flex-direction:column;gap:6px}
    .lt-packages-add{margin-top:14px;padding-top:12px;border-top:1px dashed var(--border-2)}

    /* ── Lesson Type row — legible, scannable, prominent name chip ─────── */
    .lt-row-card{background:var(--surface);border:1px solid var(--border-2);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow);transition:opacity .15s ease,box-shadow .15s ease,border-color .15s ease}
    .lt-row-card:hover{border-color:#D4D4E6;box-shadow:0 6px 22px rgba(30,27,75,0.09)}
    .lt-row-hidden{opacity:.55}
    .lt-row-top{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .lt-row-lead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0;flex:1}
    .lt-name-chip{font-size:15px;font-weight:800;padding:7px 14px;border-radius:10px;border-width:2px;border-style:solid;letter-spacing:-.1px;white-space:nowrap;line-height:1.15}
    .lt-classes-pill{font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-2);white-space:nowrap}
    .lt-row-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
    .lt-row-meta{display:flex;gap:20px;flex-wrap:wrap;padding-left:4px}
    .lt-meta-tile{display:flex;flex-direction:column;gap:2px}
    .lt-meta-label{font-size:9px;text-transform:uppercase;letter-spacing:.85px;font-weight:800;color:var(--text-3);line-height:1}
    .lt-meta-value{font-size:13px;font-weight:700;color:var(--text);line-height:1.15}
    .lt-meta-empty{color:var(--text-3);font-weight:500}

    /* Packages button — soft brand presence with an inline count badge */
    .btn-packages{background:var(--primary-soft);color:var(--primary-on-soft);border:1px solid transparent;display:inline-flex;align-items:center;gap:7px;padding:6px 8px 6px 12px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;line-height:1.4;transition:background .15s ease,color .15s ease}
    .btn-packages:hover{background:#E0DAFF}
    .btn-packages.active{background:var(--primary);color:#fff}
    .pkg-count-badge{background:#fff;color:var(--primary-on-soft);font-size:11px;padding:1px 7px;border-radius:999px;font-weight:800;min-width:18px;text-align:center;border:1px solid var(--border-2)}
    .btn-packages.active .pkg-count-badge{background:rgba(255,255,255,0.22);color:#fff;border-color:transparent}
    .btn.btn-active{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* ── Missing-instructor warning (FK orphan after instructor delete) ──
       Greyed-out name, amber ⚠ triangle inline, "Needs instructor" pill,
       and a corner ⚠ on the card itself for at-a-glance spotting. */
    .wa-card{position:relative}
    .daily-event{position:relative}
    .wa-card-warn{box-shadow:0 0 0 1.5px var(--amber-bd) inset}
    .daily-event-warn{box-shadow:0 0 0 1.5px var(--amber-bd) inset}
    .card-warn-corner{position:absolute;top:6px;right:8px;font-size:14px;color:var(--amber-tx);filter:drop-shadow(0 1px 1px rgba(0,0,0,0.15));pointer-events:none;line-height:1;z-index:1}
    .inst-missing{display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
    .inst-orphan{color:var(--text-3) !important;font-style:italic;text-decoration:line-through;text-decoration-color:rgba(180,83,9,.45)}
    .warn-tri{color:var(--amber-tx);font-size:12px;line-height:1;flex-shrink:0}
    .inst-warn-chip{display:inline-flex;align-items:center;background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd);font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:6px;line-height:1.3;white-space:nowrap}

    /* ── Instructor row: gender chip + add-form layout + editor ────────── */
    .inst-add{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
    .inst-add .input{flex:1;min-width:160px}
    .gender-toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;padding:2px;gap:2px}
    .gender-opt{appearance:none;background:transparent;border:none;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:700;color:var(--text-2);cursor:pointer;line-height:1;transition:background .15s,color .15s}
    .gender-opt:hover{background:var(--surface)}
    .gender-opt.active{background:#fff;color:var(--primary-on-soft);box-shadow:0 1px 3px rgba(30,27,75,0.1)}
    .gender-toggle-sm .gender-opt{padding:6px 8px;font-size:11px}
    .gender-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;line-height:1.3;white-space:nowrap}
    .gender-chip-female{background:var(--pink-bg);color:var(--pink-tx);border:1px solid var(--pink-bd)}
    .gender-chip-male{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD}
    .gender-chip-unset{background:var(--surface-2);color:var(--text-3);border:1px solid var(--border-2);font-weight:500}
    .inst-editor{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;padding:10px}

    /* ── Class type badge on lesson type rows ────────────────────────────── */
    .lt-type-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap}
    .lt-type-group{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
    .lt-type-personal{background:#FDF4FF;color:#7E22CE;border:1px solid #E9D5FF}

    /* ── Group replacement section in modal ─────────────────────────────── */
    .repl-section{margin-top:7px;padding-top:6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
    .repl-section-head{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
    .repl-section-title{font-size:10px;font-weight:800;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
    /* Credit balance row — plain text line (name · count · controls), no
       chip boxes. */
    .credit-row{display:flex;align-items:center;gap:8px;padding:2px 0;font-size:12px}
    .credit-row-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
    .credit-row-last{color:var(--text-3);font-size:10.5px;font-weight:500}
    .credit-controls{display:flex;align-items:center;gap:5px}
    .credit-count{font-size:11.5px;font-weight:700;color:var(--text-2);white-space:nowrap}
    .credit-count.credit-low{color:var(--red-tx)}
    .credit-btn{width:20px;height:20px;border-radius:5px;border:1px solid var(--border-2);background:#fff;font-size:13px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;color:var(--text)}
    .credit-btn:hover{background:var(--surface-2)}
    .credit-init{display:flex;gap:5px;align-items:center}
    .repl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .repl-badge-sm{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd);font-size:10px;font-weight:900;flex-shrink:0}
    /* →R button on regular student slots — quietly amber, hover lifts to clear amber */
    .repl-mark-btn{display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 10px;font-size:11px;font-weight:800;letter-spacing:.4px;background:transparent;color:var(--amber-tx);border:1px solid var(--amber-bd);border-radius:8px;cursor:pointer;white-space:nowrap;align-self:center;flex:0 0 auto;transition:background .15s, transform .15s}
    .repl-mark-btn:hover{background:var(--amber-bg);transform:translateY(-1px)}
    /* Quick-pick candidate row above the manual selector */
    .repl-quickpick{padding:10px 12px;background:#fff;border:1px dashed var(--border-2);border-radius:10px}
    .quickpick-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:#fff;border:1px solid var(--border-2);border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:background .15s, border-color .15s, transform .15s}
    .quickpick-chip:hover{transform:translateY(-1px);border-color:var(--primary)}
    .quickpick-rpending:hover{background:#FEF3C7;border-color:#FCD34D}
    .quickpick-trial:hover{background:#FEE2E2;border-color:#FCA5A5}
    .qp-meta{font-size:10px;color:var(--text-3);font-weight:500}
    /* Floating row tag on selected replacement-row swimmer */
    .qp-tag{display:inline-flex;align-items:center;height:16px;padding:0 6px;font-size:9px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;border-radius:5px;border:1px solid;box-shadow:0 1px 2px rgba(0,0,0,.06)}
    .qp-tag-r{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
    .qp-tag-trial{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A5}
    /* Replacement marker inline in cards */
    .wa-stu-repl{background:rgba(180,83,9,0.08) !important;border-color:var(--amber-bd) !important}
    .repl-mark{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:var(--amber-bg);color:var(--amber-tx);font-size:9px;font-weight:900;margin-right:3px;flex-shrink:0}
    .repl-mark-sm{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:var(--amber-bg);color:var(--amber-tx);font-size:8px;font-weight:900;margin-right:3px;vertical-align:middle}
    .daily-stu-repl{background:rgba(251,191,36,0.12);border-color:var(--amber-bd)}

    /* ── Personal class reschedule UI ───────────────────────────────────── */
    .reschedule-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .reschedule-notice{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 10px;background:var(--primary-soft);border:1px solid #D9D4F0;border-radius:8px}
    .reschedule-from-badge{font-size:12px;font-weight:700;color:var(--primary-on-soft)}
    .reschedule-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;padding:10px 0 4px;border-top:1px dashed var(--border-2);margin-top:4px}
    .swimmer-add-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}

    /* ── Swimmer list sort tabs ─────────────────────────────────────────── */
    .sort-tabs{display:inline-flex;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;padding:2px;gap:2px}
    .sort-tab{appearance:none;background:transparent;border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;color:var(--text-2);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
    .sort-tab:hover{background:var(--surface)}
    .sort-tab.active{background:#fff;color:var(--primary-on-soft);box-shadow:0 1px 3px rgba(30,27,75,.09)}

    /* ── Family group header row & indented members ─────────────────────── */
    .swimmer-group-header td{background:var(--surface-2);padding:6px 10px !important;border-bottom:1px solid var(--border-2)}
    .group-header-label{font-size:11px;font-weight:800;color:var(--text-2);letter-spacing:.3px;text-transform:uppercase}
    .swimmer-in-group td:first-child{padding-left:22px !important}

    /* ── Credits cell in swimmer list ───────────────────────────────────── */
    .credit-cell{display:flex;flex-direction:column;gap:1px}
    .credit-cell-num{font-size:15px;font-weight:800;color:var(--text);line-height:1.1}
    .credit-cell-num.credit-low{color:var(--red-tx)}
    .credit-cell-sub{font-size:10px;color:var(--text-3);line-height:1.2}

    /* ── Student registration form sections ─────────────────────────────── */
    .student-form-section{margin-top:14px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;display:flex;flex-direction:column;gap:10px}
    .student-form-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);margin-bottom:2px}
    .tc-status-row{font-size:12px;font-weight:700;padding:8px 12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .tc-status-row.tc-accepted{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
    .tc-status-row.tc-pending{background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}
    .tc-badge-ok{font-size:11px;font-weight:700;color:var(--green-tx);white-space:nowrap;cursor:default}
    .tc-badge-pending{font-size:11px;font-weight:700;color:var(--amber-tx);white-space:nowrap}

    /* ── T&C page ────────────────────────────────────────────────────────── */
    .tc-student-summary{display:flex;flex-direction:column;gap:4px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;font-size:12px}
    .tc-warn{color:var(--red-tx);font-weight:700}
    .tc-doc-scroll{max-height:480px;overflow-y:auto;padding:16px 18px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;position:relative}
    .tc-h1{font-size:18px;font-weight:800;color:var(--text);margin:0 0 4px}
    .tc-h2{font-size:14px;font-weight:700;color:var(--text-2);margin:0 0 18px;padding-bottom:10px;border-bottom:1px solid var(--border-2)}
    .tc-section{margin-bottom:18px}
    .tc-h3{font-size:13px;font-weight:800;color:var(--text);margin:0 0 6px}
    .tc-para{font-size:12px;line-height:1.7;color:var(--text-2);margin:0 0 8px;white-space:pre-line}
    .tc-scroll-hint{position:sticky;bottom:0;text-align:center;font-size:11px;color:var(--text-3);background:linear-gradient(transparent,var(--surface-2) 60%);padding:12px 0 4px;font-weight:700;pointer-events:none}
    .tc-success{background:var(--green-bg);border-color:var(--green-bd)}
    .tc-success .small{color:var(--green-tx)}

    /* Parent-intake quick-access banner — sits at the top of the Swimmers
       tab, gives front-desk staff a one-tap path to the public registration
       page on a tablet without typing the URL. Distinct purple-tinted styling
       so it reads as "a different flow" vs the regular Register card below. */
    .intake-banner{background:linear-gradient(135deg,var(--primary-soft) 0%, #F5F0FF 100%);border-color:#CFC0F2}
    .intake-banner-inner{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .intake-banner-icon{width:44px;height:44px;border-radius:12px;background:#fff;display:grid;place-items:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 8px rgba(109,91,208,.18)}
    .intake-banner-text{flex:1;min-width:200px}
    .intake-banner-title{font-size:14px;font-weight:800;color:var(--primary-on-soft);letter-spacing:.2px}
    .intake-banner-sub{font-size:12px;color:var(--text-2);margin-top:2px;line-height:1.4}
    .intake-banner-btn{flex-shrink:0;padding:10px 18px;font-size:13px}

    /* Full Class Replacement — inline, plain. Toggle is a small yellow
       text line; options are two tight text-link buttons. */
    .cancel-class-panel{margin-top:7px;padding-top:6px;border-top:1px solid var(--border)}
    .cancel-class-toggle{display:flex;justify-content:space-between;align-items:center;width:100%;padding:5px 9px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:700;color:#92400E;transition:.15s ease}
    .cancel-class-toggle:hover,.cancel-class-toggle.is-open{background:#FEF3C7;border-color:#FCD34D}
    .cancel-class-chev{font-size:10px;color:#92400E}
    .cancel-class-options{margin-top:5px;display:flex;flex-direction:column;gap:4px;padding:0}
    .cancel-class-hint{font-size:10px;color:#92400E;line-height:1.3;padding:0 2px}
    .cancel-class-buttons{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:2px}
    .cancel-class-opt{display:block;width:100%;text-align:left;padding:6px 8px;background:#fff;border:1px solid #FCD34D;border-radius:6px;cursor:pointer;transition:.15s ease}
    .cancel-class-opt:hover{background:#FEF3C7;border-color:#CA8A04}
    .cancel-class-opt-title{font-size:11.5px;font-weight:800;color:var(--text);margin-bottom:1px}
    .cancel-class-opt-sub{font-size:10px;color:var(--text-3);line-height:1.3}
    @media (max-width:600px){.cancel-class-buttons{grid-template-columns:1fr}}

    /* Pending Move banner — replaces the "click a slot to add" affordance
       with "click a slot to drop the moved class" until the user either
       picks a target or cancels. Bright purple so it can't be missed. */
    .pending-move-banner{display:flex;align-items:center;gap:14px;padding:12px 16px;background:linear-gradient(135deg,var(--primary) 0%, #8B73E8 100%);color:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 6px 20px rgba(109,91,208,.32);animation:pendingMovePulse 1.6s ease-in-out infinite}
    @keyframes pendingMovePulse{0%,100%{box-shadow:0 6px 20px rgba(109,91,208,.32)}50%{box-shadow:0 6px 28px rgba(109,91,208,.52)}}
    .pending-move-icon{font-size:22px;line-height:1;flex-shrink:0}
    .pending-move-text{flex:1;min-width:0}
    .pending-move-title{font-size:14px;font-weight:800;letter-spacing:.2px}
    .pending-move-sub{font-size:11px;opacity:.92;margin-top:2px;line-height:1.4}
    .pending-move-banner .btn.btn-ghost{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.28)}
    .pending-move-banner .btn.btn-ghost:hover{background:rgba(255,255,255,.28)}
    /* Highlight every empty slot while a move is pending — the cursor and
       hover feedback make the whole grid feel "clickable" so the scheduler
       knows they're in a drop-target state. */
    .wa-cell-targetable{cursor:crosshair !important;background:rgba(109,91,208,.04) !important}
    .wa-cell-targetable:hover{background:rgba(109,91,208,.14) !important;outline:2px dashed var(--primary);outline-offset:-2px}

    /* Pending Replacements card — surfaces the limbo bucket so the
       scheduler can see and undo a →R action that was made by mistake
       (or as a test). Amber styling because it's an actionable state,
       not an error. Renders only when there's at least one pending row
       for the currently-selected week. */
    .pending-repl-card{background:linear-gradient(135deg,#FFFBEB 0%, #FEF3C7 100%);border:1px solid #FCD34D;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(202,138,4,.08)}
    .pending-repl-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
    .pending-repl-badge{width:30px;height:30px;border-radius:50%;background:#CA8A04;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800;flex-shrink:0}
    .pending-repl-title{font-size:13px;font-weight:800;color:#854D0E;letter-spacing:.2px}
    .pending-repl-sub{font-size:11px;color:#92400E;margin-top:2px;line-height:1.4}
    .pending-repl-list{display:flex;flex-direction:column;gap:6px}
    .pending-repl-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;background:#fff;border:1px solid #FDE68A;border-radius:10px;flex-wrap:wrap}
    .pending-repl-info{display:flex;flex-direction:column;gap:1px;min-width:0}
    .pending-repl-name{font-size:13px;font-weight:700;color:var(--text)}
    .pending-repl-meta{font-size:11px;color:var(--text-3)}

    /* Read-only auto-computed age chip next to the DOB input */
    .age-display{display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;font-weight:800;color:var(--text);font-size:13px;min-width:60px;font-variant-numeric:tabular-nums}
    .age-display.is-empty{color:var(--text-3);font-weight:500}

    /* Attendance segment — one row per swimmer in the session modal.
       Pending = neutral grey hourglass; Attended = green check; Absent = amber X.
       Active state pops with a colored fill so the scheduler can scan a busy
       class at a glance and know who's been marked and who hasn't. */
    .att-seg{display:inline-flex;border:1px solid var(--border-2);border-radius:5px;overflow:hidden;flex-shrink:0;background:#fff;height:24px}
    .att-btn{width:22px;height:22px;border:none;background:transparent;color:var(--text-3);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:.12s ease;border-right:1px solid var(--border-2)}
    .att-btn:last-child{border-right:none}
    .att-btn:hover{background:var(--surface-2)}
    .att-btn.is-on.att-pending{background:#E5E7EB;color:#374151}
    .att-btn.is-on.att-attended{background:var(--green-bg);color:var(--green-tx)}
    .att-btn.is-on.att-absent{background:var(--amber-bg);color:var(--amber-tx)}

    /* ── Lessons rows (register + edit) ──────────────────────────────────── */
    .lessons-rows{display:flex;flex-direction:column;gap:8px}
    .lesson-row{display:grid;grid-template-columns:1.4fr 1.6fr 36px;gap:8px;align-items:center}
    .lesson-row-x{width:36px;height:36px;padding:0;font-size:18px;line-height:1;background:transparent;border:1px solid var(--border-2);border-radius:8px;color:var(--text-3);cursor:pointer;transition:.15s ease}
    .lesson-row-x:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx)}
    .lesson-row-x-spacer{width:36px;height:36px}
    .lesson-add-btn{align-self:flex-start;margin-top:4px;font-weight:700}
    .lesson-add-btn:hover{background:var(--primary-soft);color:var(--primary-on-soft);border-color:var(--primary)}
    @media (max-width:768px){.lesson-row{grid-template-columns:1fr 1fr 36px}}

    /* ── Collapsible Register Swimmer card ───────────────────────────────── */    .register-card{padding:0;transition:box-shadow .2s ease;overflow:hidden}
    .register-card.is-closed:hover{box-shadow:0 4px 16px rgba(109,91,208,.12)}
    .register-header{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:transparent;border:none;cursor:pointer;text-align:left;font:inherit;color:inherit;border-radius:14px;transition:background .15s ease}
    .register-card.is-closed .register-header:hover{background:var(--primary-soft)}
    .register-header-left{display:flex;align-items:center;gap:12px;min-width:0;flex-wrap:wrap}
    .register-header-icon{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-size:18px;font-weight:800;line-height:1;flex-shrink:0;transition:transform .15s ease, background .15s ease}
    .register-card.is-closed .register-header:hover .register-header-icon{transform:scale(1.08)}
    .register-card.is-open .register-header-icon{background:var(--text-3);font-size:14px}
    .register-header-title{font-size:17px;font-weight:800;color:var(--text)}
    .register-header-hint{font-size:12px}
    .register-header-chev{font-size:14px;color:var(--text-3);font-weight:700;flex-shrink:0}
    .register-body{padding:4px 18px 18px;animation:registerSlideDown .22s ease}
    @keyframes registerSlideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

    /* ── Multi-swimmer Enroll view ──────────────────────────────────────── */
    .enroll-slots{display:flex;flex-direction:column;gap:8px;margin-top:14px}
    /* ── Criteria filter controls ──────────────────────────────────── */
    .enroll-filter-section{margin-top:10px}
    .enroll-filter-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);font-weight:800;margin-bottom:4px}
    .enroll-filter-pills{display:flex;flex-wrap:wrap;gap:5px}
    .enroll-pill{display:inline-flex;align-items:center;height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border-2);background:transparent;color:var(--text-3);font-size:11.5px;font-weight:700;cursor:pointer;transition:.12s ease}
    .enroll-pill:hover{border-color:var(--primary);color:var(--text)}
    .enroll-pill.is-on{border-color:var(--primary);color:var(--text);background:#DBEAFE}
    .enroll-pill-clear{display:inline-flex;align-items:center;height:28px;padding:0 8px;border-radius:6px;border:1px dashed var(--border-2);background:transparent;color:var(--text-3);font-size:11px;cursor:pointer}
    .enroll-pill-clear:hover{border-color:#EF4444;color:#EF4444}
    .enroll-slot{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;flex-wrap:wrap}
    .enroll-slot-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
    .enroll-slot-pick{flex:1 1 240px;min-width:200px}
    .enroll-slot-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1.4 1 200px}
    .enroll-slot-x{background:transparent;border:1px solid var(--border-2);color:var(--text-3);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
    .enroll-slot-x:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx)}
    .enroll-slot-add{align-self:flex-start;padding:8px 14px;background:var(--primary-soft);border:1px dashed var(--primary);color:var(--primary-on-soft);border-radius:10px;font-weight:700;font-size:12px;cursor:pointer}
    .enroll-slot-add:hover{background:var(--primary);color:#fff}
    .enroll-summary{margin-top:12px;padding:8px 12px;background:#fff;border:1px solid var(--border-2);border-radius:8px;font-size:13px;color:var(--text-2)}
    .enroll-summary-shared{color:var(--primary-on-soft);font-weight:600}
    .enroll-summary-warn{color:var(--amber-tx);font-weight:600}
    .enroll-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .enroll-stat{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;border:1px solid}
    .enroll-stat.fits{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd)}
    .enroll-stat.partial{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd)}
    .enroll-stat.full{background:#f3f4f6;color:#6b7280;border-color:#d1d5db}

    /* Grid (mirrors WeekView wagenda) */
    .enroll-grid{display:grid;grid-template-columns:64px repeat(7,minmax(120px,1fr));gap:1px;background:var(--border-2);border:1px solid var(--border-2);border-radius:12px;overflow:hidden}
    .enroll-grid-corner{background:#fff}
    .enroll-grid-dayhead{background:#fff;padding:8px 6px;text-align:center}
    .enroll-grid-dayname{font-size:11px;font-weight:800;color:var(--primary-on-soft);text-transform:uppercase;letter-spacing:.6px}
    .enroll-grid-daydate{font-size:10px;color:var(--text-3);font-weight:600;margin-top:2px}
    .enroll-grid-time{background:#fff;padding:6px 8px;font-size:11px;font-weight:700;color:var(--text-2);text-align:right;border-top:1px solid var(--border-2)}
    .enroll-grid-cell{background:#fff;padding:4px;min-height:72px;display:flex;flex-direction:column;gap:4px;position:relative;cursor:default;transition:background .12s ease}
    .enroll-grid-cell.is-opportunity{cursor:pointer;background:repeating-linear-gradient(45deg,#fff,#fff 8px,rgba(109,91,208,.04) 8px,rgba(109,91,208,.04) 16px)}
    .enroll-grid-cell.is-opportunity:hover{background:var(--primary-soft)}
    .enroll-grid-cell.is-gold{background:repeating-linear-gradient(45deg,#FFFBEB,#FFFBEB 8px,#FEF3C7 8px,#FEF3C7 16px);outline:2px dashed #F59E0B;outline-offset:-3px}
    .enroll-grid-cell.is-gold:hover{background:#FEF3C7}
    .enroll-cell-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary-on-soft);opacity:0;transition:opacity .15s ease;pointer-events:none}
    .enroll-grid-cell.is-opportunity:hover .enroll-cell-hint{opacity:1}
    .enroll-grid-cell.is-gold .enroll-cell-hint{opacity:.6;color:#92400E}
    .enroll-grid-cell.is-gold:hover .enroll-cell-hint{opacity:1}

    /* Mini cards within cells */
    .enroll-mini{padding:5px 7px;border-radius:6px;border-left:3px solid transparent;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;position:relative;z-index:1}
    .enroll-mini-edit{font-size:10px;opacity:0;cursor:pointer;color:var(--text-2);padding:1px 3px;border-radius:3px;transition:opacity .12s ease;line-height:1;flex-shrink:0}
    .enroll-mini:hover .enroll-mini-edit{opacity:.7}
    .enroll-mini-edit:hover{opacity:1 !important;background:rgba(0,0,0,.1)}
    .enroll-add-btn{font-size:12px;color:var(--text-3);cursor:pointer;text-align:center;padding:1px 0;line-height:1.5;opacity:0;transition:opacity .12s ease;border-radius:4px}
    .enroll-grid-cell:hover .enroll-add-btn{opacity:.4}
    .enroll-add-btn:hover{opacity:1 !important;background:var(--surface-2);color:var(--primary)}
    .enroll-mini:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.08)}
    .enroll-mini-top{display:flex;justify-content:space-between;align-items:center;gap:4px}
    .enroll-mini-type{font-size:11px;font-weight:800;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 5px;border-radius:4px}
    .enroll-mini-cap{font-size:10px;font-weight:700;color:var(--text-2);flex-shrink:0}
    .enroll-mini-meta{font-size:10px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .enroll-mini-cta{margin-top:4px;font-size:9px;font-weight:900;letter-spacing:.4px;text-transform:uppercase;padding:2px 5px;border-radius:4px;display:inline-block;border:1px solid}
    .cta-fits{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd)}
    .cta-partial{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd)}
    .cta-split{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
    .cta-full{background:#f3f4f6;color:#6b7280;border-color:#d1d5db}

    /* Emphasis by category */
    .enroll-mini.mini-fits{outline:2px solid var(--green-tx);outline-offset:-1px}
    .enroll-mini.mini-partial{outline:2px solid var(--amber-tx);outline-offset:-1px;opacity:.95}
    .enroll-mini.mini-split{outline:2px dashed #F59E0B;outline-offset:-1px}
    .enroll-mini.mini-full{opacity:.5;filter:grayscale(.4)}

    /* Legend */
    .enroll-legend{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap;font-size:11px;color:var(--text-2)}
    .enroll-legend span{display:inline-flex;align-items:center;gap:5px}
    .enroll-swatch{display:inline-block;width:14px;height:14px;border-radius:3px;border:1px solid}
    .swatch-fits{background:var(--green-bg);border-color:var(--green-tx)}
    .swatch-partial{background:var(--amber-bg);border-color:var(--amber-tx)}
    .swatch-split{background:#FEF3C7;border-color:#F59E0B;border-style:dashed}
    .swatch-full{background:#f3f4f6;border-color:#d1d5db}
    .swatch-gold{background:repeating-linear-gradient(45deg,#FFFBEB,#FFFBEB 4px,#FEF3C7 4px,#FEF3C7 8px);border-color:#F59E0B;border-style:dashed}

    @media (max-width:900px){.enroll-grid{grid-template-columns:48px repeat(7,minmax(80px,1fr))}.enroll-mini-type{font-size:10px}.enroll-mini-cap{font-size:9px}.enroll-mini-meta{font-size:9px}}
    .reschedule-tag{font-size:11px;font-weight:800;color:var(--primary-on-soft);background:var(--primary-soft);border:1px solid #D9D4F0;padding:1px 5px;border-radius:5px;margin-left:5px;cursor:default}

    /* ── Credit balance UI ──────────────────────────────────────────────── */
    /* Inline credit marker on session cards */
    .credit-mark{font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.1px}
    .credit-mark.credit-low{color:var(--red-tx)}
    /* Credit ledger panel — expands from the Swimmers row. Plain, dense,
       one row per purchase. */
    .credit-panel{background:#FAFAFC;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 18px}
    .credit-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
    .credit-panel-title{font-size:14px;font-weight:800;color:var(--text)}
    .credit-panel-sub{font-size:11px;color:var(--text-3);margin-top:2px;line-height:1.35}
    .credit-panel-empty{padding:10px;background:#fff;border:1px dashed var(--border);border-radius:8px;font-size:12px;color:var(--text-3);text-align:center}
    .credit-add-form{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
    .credit-add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
    .credit-add-row .field{flex:1 1 110px;margin:0;min-width:0}
    .credit-add-hint{font-size:11px;color:var(--text-3);flex:1;align-self:center;margin-right:auto}
    .credit-lt-block{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-top:8px}
    .credit-lt-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
    .credit-lt-name{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border:1px solid;border-radius:5px}
    .credit-lt-totals{font-size:12px;color:var(--text-2)}
    .credit-lt-totals strong{color:var(--text)}
    .credit-lt-totals .credit-low{color:var(--red-tx)}
    .credit-lt-aggregate{color:var(--text-3);font-size:11px}
    .credit-empty{font-size:11px;color:var(--text-3);padding:4px 0;font-style:italic}
    .credit-ledger{width:100%;font-size:12px;border-collapse:collapse}
    .credit-ledger thead th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);font-weight:800;padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
    .credit-ledger tbody td{padding:5px 6px;border-bottom:1px solid var(--border-2)}
    .credit-ledger tbody tr:last-child td{border-bottom:none}
    .credit-delta{font-weight:800;font-family:'SF Mono',Monaco,Consolas,monospace}
    .credit-delta-pos{color:var(--green-tx)}
    .credit-delta-neg{color:var(--red-tx)}
    /* Credit-panel group context banner */
    .credit-group-banner{padding:8px 11px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;font-size:11.5px;color:#1E40AF;margin-bottom:10px;line-height:1.4}
    .credit-group-banner-bound{background:#FEF3C7;border-color:#FCD34D;color:#92400E}
    /* Quick subscription row inside a credit-lt-block */
    .credit-sub-quick{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px 0;border-bottom:1px dashed var(--border-2);margin-bottom:6px}
    .credit-sub-quick-label{font-size:10.5px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}
    /* Subscription log */
    .credit-sub-list{margin-bottom:8px}
    .credit-sub-list-title{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .credit-sub-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#FAFAFC;border:1px solid var(--border-2);border-radius:6px;margin-bottom:3px;font-size:11.5px;flex-wrap:wrap}
    .credit-sub-row.is-cancelled{opacity:0.6;text-decoration:line-through}
    .credit-sub-date{font-weight:600;min-width:80px}
    .credit-sub-amount{font-weight:800;color:var(--teal);font-family:'SF Mono',Monaco,Consolas,monospace}
    .credit-sub-subject{font-weight:600}
    .credit-sub-meta{flex:1;font-size:10.5px}
    .credit-sub-cancelled-tag{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;text-decoration:none}
    /* Highlight purchase rows that came from a subscription */
    .credit-ledger tbody tr.is-from-sub td{background:#F0F9FF}
    /* Duplicate-forward buttons (modal) */
    .dup-buttons{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
    .dup-btn{padding:5px 10px;border-radius:6px;border:1px solid #93C5FD;background:#fff;color:#1E40AF;font-size:11.5px;font-weight:700;cursor:pointer;transition:.12s ease}
    .dup-btn:hover{background:#DBEAFE;border-color:#3B82F6}
    /* Receipt printable sheet */
    .receipt-sheet{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px 22px;font-family:'Outfit','SF Mono',monospace}
    .receipt-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:12px}
    .receipt-brand{font-size:16px;font-weight:800}
    .receipt-meta{font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
    .receipt-table{width:100%;border-collapse:collapse;font-size:12px}
    .receipt-table th{text-align:left;width:120px;padding:4px 8px 4px 0;color:#666;font-weight:600;vertical-align:top}
    .receipt-table td{padding:4px 0;vertical-align:top}
    .receipt-foot{margin-top:14px;padding-top:8px;border-top:1px dashed #ccc;font-size:11px;text-align:center;color:#666}
    @media print{
      body[data-print-view="receipt"] *{visibility:hidden}
      body[data-print-view="receipt"] #receipt-sheet,
      body[data-print-view="receipt"] #receipt-sheet *{visibility:visible}
      body[data-print-view="receipt"] #receipt-sheet{position:fixed;top:0;left:0;width:100%;padding:14mm 18mm;border:none;background:#fff;color:#000}
    }
    /* Account sections in StudentEditor + ParentContactEditor — visually
       distinct from swimmer-form-section to signal "this is account-level
       data, separate from the swimmer details below". */
    .account-section{padding:10px 12px;background:#F0F9FF;border:1px solid #BFDBFE;border-radius:8px;margin-bottom:10px}
    .account-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:800;color:#1E40AF;margin-bottom:8px}

    /* T&C summary at account level — compact badges, one per swimmer. New
       flat-strip variant lives in the Accounts block below; this older
       boxed variant was superseded. */

    /* Adult-self toggle — now a single inline checkbox row in the
       swimmer-details zone (was a banner at the top). */
    .adult-self-toggle{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:#ECFEFF;border:1px solid #67E8F9;border-radius:8px;margin:2px 0 10px;cursor:pointer;font-size:12px;color:#0E7490;line-height:1.4}
    .adult-self-toggle input{margin-top:2px;flex-shrink:0}
    .adult-self-toggle span{flex:1}

    /* ════════════════════════════════════════════════════════════════
       Admin Hub — left sidebar + content panel (replaces Settings)
       ════════════════════════════════════════════════════════════════ */
    .admin-hub{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
    .admin-hub-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;position:sticky;top:70px}
    .admin-hub-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);padding:6px 10px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
    .admin-hub-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:transparent;border-radius:8px;color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:.1s ease}
    .admin-hub-item:hover{background:var(--surface-2);color:var(--text)}
    .admin-hub-item.is-on{background:var(--primary-soft);color:var(--primary-on-soft);font-weight:800}
    .admin-hub-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
    .admin-hub-content{min-width:0}
    @media(max-width:768px){
      .admin-hub{grid-template-columns:1fr}
      .admin-hub-sidebar{position:static;display:flex;flex-wrap:wrap;gap:4px;padding:8px}
      .admin-hub-title{display:none}
      .admin-hub-item{width:auto;padding:6px 10px;font-size:12px}
    }

    /* ════════════════════════════════════════════════════════════════
       Invoicing — BillingPreviewPanel, InvoicesView, InvoiceDetailPanel,
       RecordPaymentForm, PendingCreditsView
       ════════════════════════════════════════════════════════════════ */
    .billing-row-muted td{opacity:.38}
    .billing-type-chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px}
    .billing-type-chip.group{background:#DBEAFE;color:#1E3A8A;border:1px solid #93C5FD}
    .billing-type-chip.individual{background:#F0FDF4;color:#14532D;border:1px solid #86EFAC}
    .billing-type-chip.other{background:#F3F4F6;color:#374151;border:1px solid #D1D5DB}

    /* Invoice bulk action bar */
    .inv-bulk-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0b2040;border:1px solid var(--primary);border-radius:8px;margin-top:6px}

    /* Invoice column header */
    .inv-col-head{display:flex;align-items:center;gap:0;padding:4px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);font-weight:700}

    /* Invoice card list */
    .inv-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:.12s ease}
    .inv-card.is-expanded{border-color:var(--primary)}
    .inv-card.is-overdue{border-color:#EF444466}
    .inv-row{display:flex;align-items:center;gap:12px;padding:11px 12px;cursor:pointer;flex-wrap:wrap}
    .inv-row:hover{background:var(--surface-2)}
    .inv-status-chip{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:800;border:1px solid transparent}

    /* Invoice detail panel */
    .inv-detail{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface-2)}
    .inv-detail-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:12px}
    .inv-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .inv-overdue-banner{padding:8px 12px;background:#2a0808;border:1px solid #EF4444;border-radius:7px;color:#FCA5A5;font-size:12px;font-weight:700;margin-bottom:12px}

    /* Add custom line form */
    .add-line-form{padding:12px;background:#071525;border:1px dashed var(--border-2);border-radius:8px;margin-bottom:10px}

    /* Payment rows */
    .pmt-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px}

    /* Record payment form */
    .pay-form{padding:14px;background:#071525;border:1px solid var(--primary);border-radius:10px;margin-bottom:10px}
    .pay-form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:10px}

    /* Pending credit rows */
    .pc-card{border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .pc-card-body{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;flex-wrap:wrap}
    .pc-card.status-pending{border-color:#F59E0B44;background:#1a1200}
    .pc-card.status-confirmed{border-color:#10B98144;background:#001a0d}
    .pc-card.status-reversed{border-color:#EF444444;background:#1a0000;opacity:.7}
    .pc-status-chip{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:800}
    .pc-status-chip.status-pending{background:#FEF3C7;color:#92400E}
    .pc-status-chip.status-confirmed{background:#D1FAE5;color:#065F46}
    .pc-status-chip.status-reversed{background:#FEE2E2;color:#7F1D1D}
    .pc-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px}
    .pc-row.status-confirmed{opacity:.6}
    .pc-row.status-reversed{opacity:.45}

    /* Aging report */
    td.num,th.num{text-align:right}

    /* Invoice numbering settings panel */
    .inv-settings-panel{position:relative;background:#0C1E35;border:1px solid #1E3A5A;border-radius:12px;padding:18px;margin-top:10px;color:#E2E8F0}
    .inv-settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;padding-bottom:14px;border-bottom:1px solid #1E3A5A}
    .inv-settings-title{font-size:14px;font-weight:800;color:#E2E8F0;letter-spacing:-.1px}
    .inv-settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:16px}
    .inv-settings-preview{background:#071222;border:1px solid #1E3A5A;border-radius:10px;padding:14px 16px}
    .inv-settings-preview-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#64748B;font-weight:800;margin-bottom:12px}
    .inv-settings-preview-num{font-family:'Courier New',monospace;font-size:20px;font-weight:800;color:#06B6D4;letter-spacing:.5px;line-height:1}

    /* Reset counter confirmation modal (inline overlay inside the panel) */
    .reset-warn-backdrop{position:absolute;inset:0;background:rgba(6,14,26,.88);border-radius:12px;display:grid;place-items:center;z-index:10;padding:20px}
    .reset-warn-box{background:#0F1E32;border:1.5px solid #EF4444;border-radius:12px;padding:22px 24px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .reset-warn-icon{font-size:32px;line-height:1;margin-bottom:10px}
    .reset-warn-title{font-size:16px;font-weight:800;color:#FCA5A5;margin-bottom:10px;letter-spacing:-.2px}
    .reset-warn-body{font-size:13px;color:#CBD5E1;line-height:1.65;margin-bottom:18px}
    .reset-warn-body strong{color:#FCA5A5}
    .reset-warn-body em{color:#94A3B8;font-style:normal}
    .reset-warn-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

    /* ════════════════════════════════════════════════════════════════
       Sub-navigation inside the Accounts top tab
       Two children: "Accounts — Administration" and
                     "Family Groups — Administration"
       ════════════════════════════════════════════════════════════════ */
    .admin-subnav{display:flex;gap:6px;margin-bottom:10px;padding:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;width:fit-content;max-width:100%;flex-wrap:wrap}
    .admin-subnav-btn{padding:7px 13px;border:none;border-radius:7px;background:transparent;color:var(--text-2);font-weight:700;font-size:12.5px;cursor:pointer;letter-spacing:-.1px}
    .admin-subnav-btn:hover{background:var(--surface-2);color:var(--text)}
    .admin-subnav-btn.is-on{background:linear-gradient(135deg, var(--primary), var(--teal));color:#fff;box-shadow:0 2px 6px rgba(6,182,212,.25)}

    /* ════════════════════════════════════════════════════════════════
       FamilyGroupsAdminView card list
       ════════════════════════════════════════════════════════════════ */
    .fga-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
    .fga-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
    .fga-head-main{min-width:0;flex:1}
    .fga-name{font-size:14px;font-weight:800;letter-spacing:-.1px}
    .fga-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center;font-size:11.5px;color:var(--text-3)}
    .fga-pkg-tag{display:inline-block;padding:2px 7px;border-radius:999px;background:#DBEAFE;border:1px solid #93C5FD;color:#1E3A8A;font-weight:700}
    .fga-pkg-warn{background:#FEF3C7;border-color:#FCD34D;color:#92400E}
    .fga-count{display:inline-block;padding:2px 7px;border-radius:999px;background:#D1FAE5;border:1px solid #6EE7B7;color:#065F46;font-weight:700}
    .fga-count.is-empty{background:#F1F5F9;border-color:#CBD5E1;color:#64748B}
    .fga-accounts{font-style:italic}
    .fga-actions{display:flex;gap:5px;flex-shrink:0}
    .fga-members{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .fga-member-chip{display:inline-block;padding:2px 8px;border-radius:5px;background:var(--surface-2);border:1px solid var(--border-2);font-size:11px;color:var(--text-2)}

    /* ════════════════════════════════════════════════════════════════
       Billing Preview panel (Accounts → 🧾 Billing Preview)
       ════════════════════════════════════════════════════════════════ */
    .parent-billing-panel{padding:13px 14px;background:var(--surface);border:1px solid var(--border-2);border-left:3px solid #10B981;border-radius:6px;margin-bottom:10px}
    .billing-section{margin-top:10px}
    .billing-section-head{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:5px;margin-bottom:6px}
    .billing-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#065F46}
    .billing-section-sum{font-weight:800;color:#065F46;font-size:13px}
    .billing-table{width:100%;border-collapse:collapse;font-size:12px}
    .billing-table th{padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);font-weight:800;border-bottom:1px solid var(--border-2);background:var(--surface-2)}
    .billing-table th.num,.billing-table td.num{text-align:right;font-variant-numeric:tabular-nums}
    .billing-table td{padding:7px 8px;border-bottom:1px solid var(--border-2);vertical-align:top}
    .billing-table tbody tr:last-child td{border-bottom:none}
